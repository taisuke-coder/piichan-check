<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>身だしなみセルフチェック</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  /* ===== Clay-inspired design tokens =====
     canvas         #fffaf0   cream-tinted white (page floor)
     surface-soft   #faf5e8   CTA bands, modal hosts
     surface-card   #f5f0e0   cream feature cards
     surface-strong #ebe6d6   emphasized bands
     hairline       #e5e5e5   1px borders
     ink            #0a0a0a   primary text + CTA fill
     body           #3a3a3a   running text
     muted          #6a6a6a   sub-headings
     brand-pink     #ff4d8b
     brand-teal     #1a3a3a
     brand-lavender #b8a4ed
     brand-peach    #ffb084
     brand-ochre    #e8b94a
     brand-mint     #a4d4c5
     brand-coral    #ff6b5a
  */
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #fffaf0;
    color: #3a3a3a;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    font-feature-settings: "ss01" 1, "cv11" 1;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }

  /* ===== Top nav ===== */
  header {
    width: 100%;
    background: #fffaf0;
    padding: 22px 20px 20px;
    text-align: center;
    border-bottom: 1px solid #e5e5e5;
  }
  h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    color: #0a0a0a;
    letter-spacing: -0.5px;
  }
  .phase {
    font-size: 13px;
    color: #6a6a6a;
    margin-top: 4px;
    font-weight: 500;
  }

  .screen { width: 100%; max-width: 720px; padding: 36px 20px 24px; }
  .screen.hidden { display: none; }

  /* ===== Section label (eyebrow) ===== */
  .eyebrow {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6a6a6a;
    background: #f5f0e0;
    padding: 6px 12px;
    border-radius: 9999px;
    margin-bottom: 16px;
  }

  /* ===== Mode selection ===== */
  .mode-screen { text-align: center; }
  .mode-screen h2 {
    font-size: 40px;
    font-weight: 500;
    margin: 0 0 36px;
    text-align: center;
    color: #0a0a0a;
    letter-spacing: -1.5px;
    line-height: 1.05;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    text-align: left;
  }
  .mode-btn {
    border: none;
    padding: 28px 20px 24px;
    border-radius: 24px;
    text-align: left;
    cursor: pointer;
    transition: transform 0.18s ease;
    font-family: inherit;
    background: #f5f0e0;
    color: #0a0a0a;
    position: relative;
    overflow: hidden;
  }
  .mode-btn:hover { transform: translateY(-2px); }
  .mode-btn:active { transform: scale(0.98); }
  .mode-btn .icon {
    font-size: 40px;
    line-height: 1;
    margin-bottom: 16px;
  }
  .mode-btn .title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: inherit;
    line-height: 1.25;
  }
  .mode-btn .sub {
    font-size: 13px;
    margin-top: 4px;
    font-weight: 500;
    opacity: 0.7;
    color: inherit;
  }
  /* 6-color brand palette cycle */
  .mode-btn[data-color="teal"]     { background: #1a3a3a; color: #ffffff; }
  .mode-btn[data-color="pink"]     { background: #ff4d8b; color: #ffffff; }
  .mode-btn[data-color="lavender"] { background: #b8a4ed; color: #0a0a0a; }
  .mode-btn[data-color="peach"]    { background: #ffb084; color: #0a0a0a; }
  .mode-btn[data-color="ochre"]    { background: #e8b94a; color: #0a0a0a; }
  .mode-btn[data-color="cream"]    { background: #f5f0e0; color: #0a0a0a; }

  .privacy-note {
    margin-top: 24px;
    font-size: 13px;
    color: #6a6a6a;
    line-height: 1.7;
    text-align: center;
    font-weight: 400;
  }

  /* ===== Sub-question modal ===== */
  .sub-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 26, 26, 0.42);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .sub-overlay.hidden { display: none; }
  .sub-card {
    background: #fffaf0;
    border-radius: 24px;
    padding: 32px 24px 20px;
    max-width: 420px;
    width: 100%;
    border: 1px solid #e5e5e5;
  }
  .sub-card h3 {
    margin: 0 0 24px;
    font-size: 24px;
    text-align: center;
    color: #0a0a0a;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  .sub-card .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .sub-btn {
    background: #f5f0e0;
    border: none;
    color: #0a0a0a;
    padding: 20px 12px;
    border-radius: 16px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.2px;
    transition: background 0.15s;
  }
  .sub-btn:active { background: #ebe6d6; }
  .sub-cancel {
    margin-top: 16px;
    width: 100%;
    background: transparent;
    border: none;
    color: #6a6a6a;
    padding: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
  }

  /* ===== Photo screen ===== */
  .mode-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fffaf0;
    padding: 16px 20px;
    border-radius: 16px;
    margin-bottom: 16px;
    gap: 12px;
    border: 1px solid #e5e5e5;
  }
  .mode-bar .name {
    font-size: 18px;
    font-weight: 600;
    color: #0a0a0a;
    letter-spacing: -0.3px;
  }
  .mode-bar .sub {
    font-size: 13px;
    color: #6a6a6a;
    margin-top: 2px;
    font-weight: 500;
  }
  .change-btn {
    background: #f5f0e0;
    border: none;
    color: #0a0a0a;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .change-btn:active { background: #ebe6d6; }

  .canvas-wrap {
    position: relative;
    width: 100%;
    background: #fffaf0;
    border-radius: 16px;
    overflow: hidden;
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #e5e5e5;
  }
  #resultCanvas {
    display: block;
    width: 100%;
    height: auto;
    max-height: 65vh;
    object-fit: contain;
  }
  #resultCanvas.hidden { display: none; }
  .empty-state {
    color: #6a6a6a;
    font-size: 15px;
    line-height: 1.7;
    text-align: center;
    padding: 56px 24px;
    font-weight: 400;
  }
  .empty-state .big {
    font-size: 64px;
    margin-bottom: 20px;
    line-height: 1;
  }
  .empty-state strong {
    color: #0a0a0a;
    font-weight: 600;
  }
  .empty-state .hint {
    color: #9a9a9a;
    display: block;
    margin-top: 12px;
    font-size: 13px;
  }
  .loading {
    position: absolute; inset: 0;
    background: rgba(255, 250, 240, 0.92);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0a0a0a;
    font-size: 15px;
    font-weight: 500;
  }
  .loading.hidden { display: none; }

  /* ===== Action buttons ===== */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 16px 0;
  }
  .actions button {
    background: #0a0a0a;
    color: #ffffff;
    border: none;
    padding: 16px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.1px;
    transition: background 0.15s, transform 0.12s;
  }
  .actions button:active {
    background: #1a1a1a;
    transform: scale(0.98);
  }
  .actions button.secondary {
    background: #fffaf0;
    color: #0a0a0a;
    border: 1px solid #e5e5e5;
  }
  .actions button.secondary:active { background: #f5f0e0; }
  .actions button:disabled {
    background: #ebe6d6;
    color: #9a9a9a;
    cursor: not-allowed;
    transform: none;
  }

  /* ===== Summary (feature-card style) ===== */
  .summary {
    margin-top: 16px;
    padding: 28px 24px;
    border-radius: 24px;
    text-align: center;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    background: #f5f0e0;
    color: #0a0a0a;
    line-height: 1.35;
  }
  .summary.ok   { background: #a4d4c5; color: #0a0a0a; }
  .summary.warn { background: #ffb084; color: #0a0a0a; }
  .summary.ng   { background: #ff6b5a; color: #ffffff; }
  .summary.hidden { display: none; }

  /* ===== Check list ===== */
  .check-list {
    display: flex; flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .check {
    background: #fffaf0;
    padding: 18px 20px;
    border-radius: 16px;
    border: 1px solid #e5e5e5;
    border-left: 4px solid #d4d4d4;
  }
  .check .head {
    font-size: 11px;
    color: #6a6a6a;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }
  .check .value {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.3px;
    margin: 8px 0 4px;
    color: #0a0a0a;
    line-height: 1.35;
  }
  .check .detail {
    font-size: 13px;
    color: #6a6a6a;
    line-height: 1.6;
    font-weight: 400;
  }
  .check.ok {
    background: #f0f7f1;
    border-color: #d0e5d4;
    border-left-color: #22c55e;
  }
  .check.ok .value { color: #15803d; }
  .check.warn {
    background: #fff8e8;
    border-color: #f0e0a8;
    border-left-color: #e8b94a;
  }
  .check.warn .value { color: #a05a15; }
  .check.ng {
    background: #fff1ee;
    border-color: #f5d0c8;
    border-left-color: #ff6b5a;
  }
  .check.ng .value { color: #c43820; }
  .check.disabled {
    opacity: 0.5;
    border-left-color: #d4d4d4;
  }

  /* ===== Legend ===== */
  .legend {
    margin-top: 16px;
    font-size: 13px;
    color: #6a6a6a;
    line-height: 1.7;
    background: #fffaf0;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #e5e5e5;
    font-weight: 400;
  }
  .legend .row { display: flex; align-items: center; gap: 8px; }
  .swatch {
    display: inline-block;
    width: 14px; height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend .hint {
    margin-top: 8px;
    color: #9a9a9a;
    font-size: 12px;
  }

  /* ===== Mobile ===== */
  @media (max-width: 640px) {
    .mode-screen h2 { font-size: 32px; letter-spacing: -1px; }
    .mode-btn { padding: 24px 16px 20px; }
    .mode-btn .icon { font-size: 36px; }
    .sub-card h3 { font-size: 20px; }
    .summary { font-size: 20px; padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>身だしなみセルフチェック</h1>
  <div class="phase">🐥 ピーちゃんと一緒にかくにん</div>
</header>

<!-- ===== Mode selection ===== -->
<section id="modeScreen" class="screen mode-screen">
  <span class="eyebrow">Step 1 — 制服モードを選ぼう</span>
  <h2>今日はどの制服？</h2>
  <div id="modeGrid" class="mode-grid"></div>
  <div class="privacy-note">
    📱 写真はぜんぶこの端末の中だけで処理されるよ。<br>
    どこにも送信されないから安心してね。
  </div>
</section>

<!-- ===== Generic sub-question modal ===== -->
<div id="subOverlay" class="sub-overlay hidden">
  <div class="sub-card">
    <h3 id="subQuestion">—</h3>
    <div class="options" id="subOptions"></div>
    <button class="sub-cancel" id="subCancel">キャンセル</button>
  </div>
</div>

<!-- ===== Photo screen ===== -->
<section id="photoScreen" class="screen hidden">
  <div class="mode-bar">
    <div>
      <div class="name" id="modeName">—</div>
      <div class="sub" id="modeSub">—</div>
    </div>
    <button class="change-btn" id="changeMode">モード変更</button>
  </div>

  <div class="canvas-wrap">
    <div class="empty-state" id="emptyState">
      <div class="big">🐥📸</div>
      <strong>写真を撮る</strong> か <strong>アルバムから選ぶ</strong> でね♪
      <span class="hint">ピーちゃんが全身をチェックするよ〜</span>
    </div>
    <canvas id="resultCanvas" class="hidden"></canvas>
    <div class="loading hidden" id="loading">🐥 ピーちゃんが見てるよ...</div>
  </div>

  <div class="actions">
    <button id="cameraBtn">📷 カメラで撮影</button>
    <button id="galleryBtn" class="secondary">🖼 アルバムから選ぶ</button>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="galleryInput" accept="image/*" hidden>

  <div class="summary hidden" id="summary"></div>

  <div class="check-list" id="checkList"></div>

  <div class="legend">
    <div class="row"><span class="swatch" style="background:#e8b94a;"></span>膝の高さ（基準線）</div>
    <div class="row"><span class="swatch" style="background:#a4d4c5;"></span>スカートの裾（推定）</div>
    <div class="row"><span class="swatch" style="background:#ff4d8b;"></span>ソックスの上端（推定）</div>
    <div class="hint">
      ・全身（頭〜足元）が入った写真を使ってください<br>
      ・正面向き／無地の背景／自然光だと精度が上がるよ
    </div>
  </div>
</section>

<script type="module">
  import {
    PoseLandmarker,
    FilesetResolver,
    DrawingUtils
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  let rules = null;
  let selectedMode = null;
  let selectedBottomsType = null;
  let selectedShirtType = null;
  let poseLandmarker = null;

  const modeScreen = document.getElementById('modeScreen');
  const photoScreen = document.getElementById('photoScreen');
  const modeGrid = document.getElementById('modeGrid');
  const subOverlay = document.getElementById('subOverlay');
  const subCancel = document.getElementById('subCancel');
  const modeName = document.getElementById('modeName');
  const modeSub = document.getElementById('modeSub');
  const changeMode = document.getElementById('changeMode');
  const cameraBtn = document.getElementById('cameraBtn');
  const galleryBtn = document.getElementById('galleryBtn');
  const cameraInput = document.getElementById('cameraInput');
  const galleryInput = document.getElementById('galleryInput');
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const emptyState = document.getElementById('emptyState');
  const loading = document.getElementById('loading');
  const checkList = document.getElementById('checkList');
  const summary = document.getElementById('summary');

  const sampleCanvas = document.createElement('canvas');
  const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

  // Brand color cycle for mode cards
  const BRAND_COLORS = ['teal', 'pink', 'lavender', 'peach', 'ochre', 'cream'];

  async function init() {
    try {
      const res = await fetch('rules.json');
      rules = await res.json();
    } catch (e) {
      modeGrid.innerHTML = '<div style="grid-column: 1/-1; color: #c43820; padding: 24px; text-align: center; background: #fff1ee; border-radius: 16px;">' +
        'rules.json の読み込みに失敗しました。<br>localhost 経由で開いているか確認してください。</div>';
      return;
    }
    buildModeGrid();
  }

  function buildModeGrid() {
    modeGrid.innerHTML = '';
    rules.modes.forEach((mode, i) => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn';
      btn.dataset.color = BRAND_COLORS[i % BRAND_COLORS.length];
      btn.innerHTML = `
        <div class="icon">${mode.icon}</div>
        <div class="title">${mode.label}</div>
        <div class="sub">${mode.season_label}</div>
      `;
      btn.addEventListener('click', () => handleModeClick(mode));
      modeGrid.appendChild(btn);
    });
  }

  function handleModeClick(mode) {
    selectedMode = mode;
    selectedBottomsType = null;
    selectedShirtType = null;
    proceedToNextSubQuestion();
  }

  function proceedToNextSubQuestion() {
    if (selectedMode.needs_bottoms_type && !selectedBottomsType) {
      showSubModal('ボトムスはどちらですか？', [
        { label: 'スカート', value: 'skirt' },
        { label: 'ズボン',   value: 'pants' }
      ], (val) => {
        selectedBottomsType = val;
        proceedToNextSubQuestion();
      });
      return;
    }
    if (selectedMode.needs_shirt_type && !selectedShirtType) {
      showSubModal('シャツの種類は？', [
        { label: 'Yシャツ',    value: 'shirt' },
        { label: 'ポロシャツ', value: 'polo' }
      ], (val) => {
        selectedShirtType = val;
        proceedToNextSubQuestion();
      });
      return;
    }
    goToPhotoScreen();
  }

  function showSubModal(question, options, onSelect) {
    document.getElementById('subQuestion').textContent = question;
    const optsEl = document.getElementById('subOptions');
    optsEl.innerHTML = '';
    for (const opt of options) {
      const btn = document.createElement('button');
      btn.className = 'sub-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        subOverlay.classList.add('hidden');
        onSelect(opt.value);
      });
      optsEl.appendChild(btn);
    }
    subOverlay.classList.remove('hidden');
  }

  subCancel.addEventListener('click', () => {
    selectedMode = null;
    selectedBottomsType = null;
    selectedShirtType = null;
    subOverlay.classList.add('hidden');
  });

  changeMode.addEventListener('click', () => {
    photoScreen.classList.add('hidden');
    modeScreen.classList.remove('hidden');
    selectedMode = null;
    selectedBottomsType = null;
    selectedShirtType = null;
    canvas.classList.add('hidden');
    emptyState.style.display = '';
    summary.classList.add('hidden');
  });

  function goToPhotoScreen() {
    modeScreen.classList.add('hidden');
    photoScreen.classList.remove('hidden');
    modeName.textContent = selectedMode.label;
    let sub = selectedMode.season_label;
    if (selectedBottomsType) {
      sub += ' ／ ' + (selectedBottomsType === 'skirt' ? 'スカート' : 'ズボン');
    }
    if (selectedShirtType) {
      sub += ' ／ ' + (selectedShirtType === 'shirt' ? 'Yシャツ' : 'ポロシャツ');
    }
    modeSub.textContent = sub;
    canvas.classList.add('hidden');
    emptyState.style.display = '';
    summary.classList.add('hidden');
    renderCheckList();
  }

  function getEffectiveChecks() {
    if (selectedMode.checks_by_bottoms) {
      return selectedMode.checks_by_bottoms[selectedBottomsType] || {};
    }
    return selectedMode.checks || {};
  }

  function renderCheckList() {
    checkList.innerHTML = '';
    const c = getEffectiveChecks();

    addCheck('skirt', 'スカート丈',
      c.skirt_length === true ? 'これからチェックするよ〜🐥' : '今回はおやすみ〜♪',
      c.skirt_length === true ? null : 'disabled', '');

    const sockRule = c.sock_length;
    if (!sockRule) {
      addCheck('sock', 'ソックス丈', '今回はおやすみ〜♪', 'disabled', '');
    } else if (sockRule.mode === 'notice') {
      addCheck('sock', 'ソックス丈', '🐥 自分で見てね〜', 'warn',
        sockRule.message || 'ズボンに隠れて見えないよ〜！自分でチェックしてね♪');
    } else {
      addCheck('sock', 'ソックス丈', 'これからチェックするよ〜🐥', null, sockRule.notes || '');
    }

    if (c.under_jacket) {
      addCheck('under_jacket', 'ジャケットの下', 'これからチェックするよ〜🐥', null, c.under_jacket.notes || '');
    }
  }

  function addCheck(id, title, value, level, detail) {
    const div = document.createElement('div');
    div.className = 'check' + (level ? ' ' + level : '');
    div.id = 'check-' + id;
    div.innerHTML = `
      <div class="head">${title}</div>
      <div class="value">${value}</div>
      <div class="detail">${detail}</div>
    `;
    checkList.appendChild(div);
  }

  function updateCheck(id, level, value, detail) {
    const el = document.getElementById('check-' + id);
    if (!el) return;
    el.className = 'check' + (level ? ' ' + level : '');
    el.querySelector('.value').textContent = value;
    el.querySelector('.detail').textContent = detail;
  }

  // ===== File handling =====
  cameraBtn.addEventListener('click', () => cameraInput.click());
  galleryBtn.addEventListener('click', () => galleryInput.click());
  cameraInput.addEventListener('change', e => handleFile(e.target.files[0]));
  galleryInput.addEventListener('change', e => handleFile(e.target.files[0]));

  async function handleFile(file) {
    if (!file) return;
    loading.classList.remove('hidden');
    summary.classList.add('hidden');
    try {
      if (!poseLandmarker) await initPose();
      const bitmap = await createImageBitmap(file);
      await analyzeImage(bitmap);
    } catch (err) {
      console.error(err);
      alert('解析エラー: ' + (err.message || err));
    } finally {
      loading.classList.add('hidden');
    }
  }

  async function initPose() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "IMAGE",
      numPoses: 1
    });
  }

  // ===== Image analysis =====
  async function analyzeImage(bitmap) {
    canvas.width = bitmap.width;
    canvas.height = bitmap.height;
    sampleCanvas.width = bitmap.width;
    sampleCanvas.height = bitmap.height;

    ctx.drawImage(bitmap, 0, 0);
    sampleCtx.drawImage(bitmap, 0, 0);

    emptyState.style.display = 'none';
    canvas.classList.remove('hidden');

    const result = poseLandmarker.detect(bitmap);
    const checks = getEffectiveChecks();

    if (!result.landmarks || result.landmarks.length === 0) {
      drawError('ピピっ！？人がうつってないよ〜！全身うつしてみて〜');
      if (checks.skirt_length === true) updateCheck('skirt', 'warn', 'お顔が見えないよ〜', '');
      const sr = checks.sock_length;
      if (sr && sr.mode !== 'notice')   updateCheck('sock',  'warn', 'お顔が見えないよ〜', '');
      if (checks.under_jacket)          updateCheck('under_jacket', 'warn', 'お顔が見えないよ〜', '');
      showSummary('warn', '🐥 だれもうつってないみたい...');
      return;
    }

    const lm = result.landmarks[0];
    drawSkeleton(lm);

    const results = [];
    if (checks.skirt_length === true) {
      results.push(checkSkirt(lm));
    }
    const sockRule = checks.sock_length;
    if (sockRule && sockRule.mode !== 'notice') {
      results.push(checkSock(lm, sockRule));
    }
    if (checks.under_jacket) {
      results.push(checkUnderJacket(lm, checks.under_jacket));
    }

    const hasNg   = results.some(r => r === 'ng');
    const hasWarn = results.some(r => r === 'warn');
    if (results.length === 0) showSummary('warn', '🐥 確認するところがないよ〜');
    else if (hasNg)   showSummary('ng',   '🥺 ちょっと直したいかも〜');
    else if (hasWarn) showSummary('warn', '💭 もうちょっと整えてみよ〜');
    else              showSummary('ok',   '🎀 ばっちり！今日もかわいいよ〜♪');
  }

  function showSummary(level, text) {
    summary.className = 'summary ' + level;
    summary.textContent = text;
    summary.classList.remove('hidden');
  }

  function drawError(msg) {
    ctx.fillStyle = 'rgba(10,10,10,0.78)';
    ctx.fillRect(0, canvas.height/2 - 30, canvas.width, 60);
    ctx.fillStyle = '#fffaf0';
    ctx.font = `${Math.floor(canvas.width / 30)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(msg, canvas.width/2, canvas.height/2);
  }

  function drawSkeleton(lm) {
    const drawingUtils = new DrawingUtils(ctx);
    drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {
      color: 'rgba(255,250,240,0.55)',
      lineWidth: Math.max(2, canvas.width / 400)
    });
    drawingUtils.drawLandmarks(lm, {
      radius: Math.max(2, canvas.width / 250),
      color: '#fffaf0'
    });
  }

  function drawHorizontalLine(y, color, dashed = false) {
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2, canvas.width / 300);
    if (dashed) ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(0, y * canvas.height);
    ctx.lineTo(canvas.width, y * canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawLabel(text, y, color) {
    const fontSize = Math.max(14, Math.floor(canvas.width / 35));
    ctx.font = `600 ${fontSize}px Inter, sans-serif`;
    const padding = fontSize * 0.45;
    const w = ctx.measureText(text).width + padding * 2;
    const yPx = y * canvas.height;
    ctx.fillStyle = color;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(0, yPx - fontSize - padding/2, w, fontSize + padding, 6);
    else ctx.rect(0, yPx - fontSize - padding/2, w, fontSize + padding);
    ctx.fill();
    ctx.fillStyle = '#0a0a0a';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, padding, yPx - fontSize/2);
  }

  function drawSampleBox(cxNorm, cyNorm, halfW, halfH, color, label) {
    const px = cxNorm * canvas.width;
    const py = cyNorm * canvas.height;
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2, canvas.width / 280);
    ctx.strokeRect(px - halfW, py - halfH, halfW * 2, halfH * 2);
    if (label) {
      const fontSize = Math.max(14, Math.floor(canvas.width / 45));
      ctx.font = `600 ${fontSize}px Inter, sans-serif`;
      const padding = fontSize * 0.35;
      const labelW = ctx.measureText(label).width + padding * 2;
      ctx.fillStyle = color;
      ctx.fillRect(px + halfW + 6, py - halfH, labelW, fontSize + padding);
      ctx.fillStyle = '#0a0a0a';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(label, px + halfW + 6 + padding, py - halfH + padding/2);
    }
  }

  // ===== Sampling helpers =====
  function sampleColumn(sctx, cx, y0, y1, halfStrip, w, h) {
    const x0 = Math.max(0, cx - halfStrip);
    const x1 = Math.min(w, cx + halfStrip + 1);
    const yA = Math.max(0, y0);
    const yB = Math.min(h, y1);
    if (x1 <= x0 || yB <= yA) return null;
    const data = sctx.getImageData(x0, yA, x1 - x0, yB - yA).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i]; g += data[i+1]; b += data[i+2]; n++;
    }
    return n > 0 ? { r: r/n, g: g/n, b: b/n } : null;
  }

  function colorDelta(a, b) {
    const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
    return Math.sqrt(dr*dr + dg*dg + db*db);
  }

  // ===== Skirt check =====
  function checkSkirt(lm) {
    const lh = lm[23], rh = lm[24];
    const lk = lm[25], rk = lm[26];
    const la = lm[27], ra = lm[28];
    if (!lh || !rh || !lk || !rk || (lk.visibility ?? 1) < 0.4 || (rk.visibility ?? 1) < 0.4) {
      updateCheck('skirt', 'warn', '膝が見えないよ〜', '下半身もしっかりうつしてみて〜♪');
      return 'warn';
    }
    const kneeY = (lk.y + rk.y) / 2;
    const ankleY = ((la?.y ?? kneeY + 0.15) + (ra?.y ?? kneeY + 0.15)) / 2;
    const hipY = (lh.y + rh.y) / 2;

    drawHorizontalLine(kneeY, '#e8b94a', true);
    drawLabel('膝の高さ', kneeY, '#e8b94a');

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const cx = (lh.x + rh.x) / 2;
    const px = Math.floor(cx * w);
    const startY = Math.floor((hipY + (kneeY - hipY) * 0.25) * h);
    const endY   = Math.floor((kneeY + (ankleY - kneeY) * 0.5) * h);

    const baseline = sampleColumn(sampleCtx, px, startY, startY + 8, 6, w, h);
    if (!baseline) {
      updateCheck('skirt', 'warn', 'うーん、わからないかも...', '色がうまく見えなかったよ〜！');
      return 'warn';
    }
    const THRESHOLD = 45;
    const REQUIRED = 4;
    let consec = 0;
    let hemY = -1;
    for (let y = startY + 8; y < endY && y < h; y++) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, 6, w, h);
      if (!row) continue;
      if (colorDelta(row, baseline) > THRESHOLD) {
        if (++consec >= REQUIRED) {
          hemY = (y - REQUIRED) / h;
          break;
        }
      } else { consec = 0; }
    }

    if (hemY < 0) {
      updateCheck('skirt', 'warn', '裾がよくわからないよ〜', '黄色のせんが膝だよ！自分で見てみてね♪');
      return 'warn';
    }

    drawHorizontalLine(hemY, '#a4d4c5');
    drawLabel('スカート裾', hemY, '#a4d4c5');

    const kneeAnkle = ankleY - kneeY;
    if (kneeAnkle <= 0.01) {
      updateCheck('skirt', 'warn', '計測不可', '');
      return 'warn';
    }
    const cm = ((hemY - kneeY) / kneeAnkle) * 40;
    if (cm < -3) {
      updateCheck('skirt', 'ng', `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`, 'あらら〜ちょっと短いかも！直してみよ？🥺');
      return 'ng';
    } else if (cm < -0.5) {
      updateCheck('skirt', 'warn', `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`, 'もうちょっとだけ下げてみる？ピピっ');
      return 'warn';
    } else if (cm < 1.5) {
      updateCheck('skirt', 'warn', '膝の高さ付近', 'ちょうど膝のとこだよ〜！');
      return 'warn';
    } else {
      updateCheck('skirt', 'ok', `膝より約 ${cm.toFixed(1)} cm 下`, 'ばっちりだよ〜！🎀');
      return 'ok';
    }
  }

  // ===== Sock check =====
  function checkSock(lm, rule) {
    const lk = lm[25], rk = lm[26];
    const la = lm[27], ra = lm[28];
    const lConf = ((lk?.visibility ?? 0) + (la?.visibility ?? 0)) / 2;
    const rConf = ((rk?.visibility ?? 0) + (ra?.visibility ?? 0)) / 2;
    let knee, ankle;
    if (lConf >= rConf && lConf > 0.4) { knee = lk; ankle = la; }
    else if (rConf > 0.4)               { knee = rk; ankle = ra; }
    else {
      updateCheck('sock', 'warn', 'あれ〜？足が見えないよ！', '足元もうつしてみて〜♪');
      return 'warn';
    }
    if (!ankle || ankle.y <= knee.y) {
      updateCheck('sock', 'warn', 'うまく見えなかったよ〜', '');
      return 'warn';
    }

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const px = Math.floor(((knee.x + ankle.x) / 2) * w);
    const yLow  = Math.floor((ankle.y - 0.02) * h);
    const yHigh = Math.floor((knee.y + 0.02) * h);
    if (yLow <= yHigh) {
      updateCheck('sock', 'warn', 'うまく見えなかったよ〜', '');
      return 'warn';
    }

    const baseline = sampleColumn(sampleCtx, px, yLow - 10, yLow, 6, w, h);
    if (!baseline) {
      updateCheck('sock', 'warn', 'うーん、わからないかも...', '');
      return 'warn';
    }

    const THRESHOLD = 35;
    const REQUIRED = 3;
    let consec = 0;
    let sockTopY = knee.y;
    let foundTransition = false;
    for (let y = yLow - 1; y >= yHigh; y--) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, 6, w, h);
      if (!row) continue;
      if (colorDelta(row, baseline) > THRESHOLD) {
        if (++consec >= REQUIRED) {
          sockTopY = (y + REQUIRED) / h;
          foundTransition = true;
          break;
        }
      } else { consec = 0; }
    }

    drawHorizontalLine(sockTopY, '#ff4d8b');
    drawLabel('ソックス上端', sockTopY, '#ff4d8b');

    const covered = Math.max(0, Math.min(1, 1 - (sockTopY - knee.y) / (ankle.y - knee.y)));
    const cls = covered > 0.75 ? 'high' : covered > 0.35 ? 'short' : 'ankle';
    const expected = Array.isArray(rule.expected) ? rule.expected : [rule.expected];
    const ankleForbidden = rule.ankle_forbidden === true;

    let label;
    if (cls === 'high') label = 'ハイソックス';
    else if (cls === 'short') label = '短めソックス';
    else label = 'くるぶし丈';

    const pct = `膝〜足首間で${Math.round(covered * 100)}%カバー`;

    if (cls === 'ankle' && (ankleForbidden || !expected.includes('ankle'))) {
      updateCheck('sock', 'ng', label, `くるぶし丈はこのモードでは🙅‍♀️だよ〜！ハイソックスにしてみよ？（${pct}）`);
      return 'ng';
    }
    if (expected.includes(cls)) {
      updateCheck('sock', 'ok', label, `ばっちりだよ〜！🎀（${pct}）`);
      return 'ok';
    }
    if (expected.includes('high') && cls === 'short') {
      updateCheck('sock', 'ng', label, `このモードはハイソックスじゃないとだめなんだ〜！（${pct}）`);
      return 'ng';
    }
    if (expected.includes('short') && cls === 'high') {
      updateCheck('sock', 'warn', label, `ちょっと長めかも〜？ピピっ（${pct}）`);
      return 'warn';
    }
    updateCheck('sock', 'warn', label, `あれ？ちょっと違う丈かも〜（${pct}）`);
    return 'warn';
  }

  // ===== Under-jacket check =====
  function checkUnderJacket(lm, rule) {
    const ls = lm[11], rs = lm[12];
    const lh = lm[23], rh = lm[24];
    if (!ls || !rs || !lh || !rh ||
        (ls.visibility ?? 1) < 0.4 || (rs.visibility ?? 1) < 0.4) {
      updateCheck('under_jacket', 'warn', '上半身が見えないよ〜！',
        '肩から胸までうつしてみて〜♪');
      return 'warn';
    }

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const shoulderY = (ls.y + rs.y) / 2;
    const hipY      = (lh.y + rh.y) / 2;
    const chestX    = (ls.x + rs.x) / 2;
    const torsoH    = hipY - shoulderY;
    if (torsoH <= 0.05) {
      updateCheck('under_jacket', 'warn', 'うまく見えなかったよ〜', '');
      return 'warn';
    }

    const vY = shoulderY + torsoH * 0.25;
    const jacketX = ls.x * 0.7 + chestX * 0.3;

    const halfX = Math.max(4, Math.floor(w * 0.018));
    const halfY = Math.max(4, Math.floor(h * 0.012));
    const vCx  = Math.floor(chestX  * w);
    const jCx  = Math.floor(jacketX * w);
    const vCy  = Math.floor(vY * h);

    const vSample = sampleColumn(sampleCtx, vCx, vCy - halfY, vCy + halfY, halfX, w, h);
    const jSample = sampleColumn(sampleCtx, jCx, vCy - halfY, vCy + halfY, halfX, w, h);
    if (!vSample || !jSample) {
      updateCheck('under_jacket', 'warn', 'うーん、わからないかも...', '');
      return 'warn';
    }

    drawSampleBox(chestX,  vY, halfX, halfY, '#b8a4ed', 'V開口部');
    drawSampleBox(jacketX, vY, halfX * 0.8, halfY * 0.8, 'rgba(184,164,237,0.5)', '');

    const vBright = (vSample.r + vSample.g + vSample.b) / 3;
    const jBright = (jSample.r + jSample.g + jSample.b) / 3;
    const delta = vBright - jBright;

    if (rule.expected_visible === 'shirt') {
      if (delta > 50) {
        updateCheck('under_jacket', 'ok', 'Yシャツのみ♪',
          `ジャケットの下にYシャツがちゃんと見えるよ〜！正装ばっちり🎀（明度差 ${Math.round(delta)}）`);
        return 'ok';
      } else if (delta > 15) {
        updateCheck('under_jacket', 'warn', 'うーん、よく見えないかも...',
          `色がちゃんと見えないんだ〜。明るいとこでもう一回撮ってみて？✨（差 ${Math.round(delta)}）`);
        return 'warn';
      } else {
        updateCheck('under_jacket', 'ng', 'あれ？ベスト着てるかも？',
          `正装はYシャツだけだよ〜！ベストかセーターを脱いでみよ？🥺（差 ${Math.round(delta)}）`);
        return 'ng';
      }
    }

    if (rule.expected_visible === 'navy_layer') {
      if (Math.abs(delta) < 20) {
        updateCheck('under_jacket', 'ok', '紺のベスト見えたよ〜🎀',
          `紺の層がちゃんとうつってるよ〜♪（明度差 ${Math.round(delta)}）`);
        return 'ok';
      } else if (delta > 50) {
        updateCheck('under_jacket', 'ng', 'ベスト着てないかも？',
          `Yシャツだけになってない？ベスト着てるか確認してみて〜！（差 ${Math.round(delta)}）`);
        return 'ng';
      } else {
        updateCheck('under_jacket', 'warn', 'うーん、よく見えないかも...', '');
        return 'warn';
      }
    }

    updateCheck('under_jacket', 'warn', 'うーん、まだわからないんだ〜', '');
    return 'warn';
  }

  init();
</script>

</body>
