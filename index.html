<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>身だしなみセルフチェック</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* =========================================================================
     Design tokens — Figma-style monochrome + pastel color blocks
     ========================================================================= */
  :root {
    /* Surface */
    --canvas: #ffffff;
    --ink: #000000;
    --inverse-ink: #ffffff;
    --hairline: #e5e5e5;
    --hairline-soft: #ededed;
    --surface-soft: #f7f7f5;

    /* Color blocks */
    --block-lime:   #d4fb7b;
    --block-lilac:  #d5c8ff;
    --block-cream:  #ffeec9;
    --block-mint:   #b8f0d2;
    --block-pink:   #ffc4dc;
    --block-coral:  #ffb3a3;
    --block-navy:   #1a1e47;

    /* Visualization overlays (photo) */
    --overlay-knee:  #000000;
    --overlay-hem:   #22c55e;
    --overlay-sock:  #e11d48;
    --overlay-vbox:  #7c3aed;

    /* Typography */
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  }
  @supports (font-variation-settings: normal) {
    :root { --font-sans: 'Inter var', 'Inter', -apple-system, system-ui, sans-serif; }
  }

  /* =========================================================================
     Base
     ========================================================================= */
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--canvas);
    color: var(--ink);
    font-family: var(--font-sans);
    font-feature-settings: 'kern', 'ss01';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; flex-direction: column;
    min-height: 100vh;
  }

  /* =========================================================================
     Top nav
     ========================================================================= */
  header {
    width: 100%;
    background: var(--canvas);
    border-bottom: 1px solid var(--hairline);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  header .brand {
    font-size: 18px;
    font-weight: 540;
    font-variation-settings: 'wght' 540;
    letter-spacing: -0.3px;
  }
  header .tag {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    opacity: 0.55;
  }

  /* =========================================================================
     Screen container
     ========================================================================= */
  .screen {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 96px 32px;
  }
  .screen.hidden { display: none; }

  /* =========================================================================
     Eyebrow (mono uppercase label)
     ========================================================================= */
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 24px;
    display: inline-block;
  }

  /* =========================================================================
     Mode selection
     ========================================================================= */
  .mode-screen { text-align: left; }
  .mode-screen h2 {
    font-size: 72px;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    letter-spacing: -1.5px;
    line-height: 1.0;
    margin: 0 0 64px;
    color: var(--ink);
    max-width: 900px;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .mode-btn {
    border: none;
    padding: 40px 32px 32px;
    border-radius: 24px;
    text-align: left;
    cursor: pointer;
    transition: transform 0.18s ease;
    font-family: inherit;
    background: var(--surface-soft);
    color: var(--ink);
    position: relative;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .mode-btn:hover { transform: translateY(-3px); }
  .mode-btn:active { transform: scale(0.99); }
  .mode-btn .mode-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: inherit;
    opacity: 0.7;
  }
  .mode-btn .title {
    font-size: 32px;
    font-weight: 540;
    font-variation-settings: 'wght' 540;
    letter-spacing: -0.6px;
    line-height: 1.1;
    color: inherit;
    margin-top: 16px;
  }
  .mode-btn .arrow {
    font-size: 24px;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    color: inherit;
    align-self: flex-end;
    transition: transform 0.2s ease;
  }
  .mode-btn:hover .arrow { transform: translateX(6px); }

  /* Block color variants */
  .mode-btn[data-color="navy"]  { background: var(--block-navy);  color: var(--inverse-ink); }
  .mode-btn[data-color="lilac"] { background: var(--block-lilac); }
  .mode-btn[data-color="mint"]  { background: var(--block-mint);  }
  .mode-btn[data-color="cream"] { background: var(--block-cream); }
  .mode-btn[data-color="coral"] { background: var(--block-coral); }
  .mode-btn[data-color="pink"]  { background: var(--block-pink);  }
  .mode-btn[data-color="lime"]  { background: var(--block-lime);  }

  /* Privacy block (lime) */
  .privacy-block {
    background: var(--block-lime);
    border-radius: 24px;
    padding: 48px 40px;
    margin-top: 96px;
    max-width: 100%;
  }
  .privacy-block .eyebrow { margin-bottom: 16px; }
  .privacy-block p {
    font-size: 22px;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    line-height: 1.4;
    letter-spacing: -0.2px;
    color: var(--ink);
    margin: 0;
    max-width: 720px;
  }

  /* =========================================================================
     Sub modal
     ========================================================================= */
  .sub-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  .sub-overlay.hidden { display: none; }
  .sub-card {
    background: var(--canvas);
    border-radius: 24px;
    padding: 48px 32px 32px;
    max-width: 480px;
    width: 100%;
  }
  .sub-card .eyebrow { margin-bottom: 12px; }
  .sub-card h3 {
    margin: 0 0 32px;
    font-size: 36px;
    color: var(--ink);
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    letter-spacing: -0.7px;
    line-height: 1.05;
  }
  .sub-card .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .sub-btn {
    background: var(--ink);
    border: none;
    color: var(--inverse-ink);
    padding: 16px 24px;
    border-radius: 9999px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 480;
    font-variation-settings: 'wght' 480;
    font-family: inherit;
    letter-spacing: -0.15px;
    line-height: 1.2;
    transition: opacity 0.15s, transform 0.12s;
  }
  .sub-btn:hover { opacity: 0.88; }
  .sub-btn:active { transform: scale(0.98); }
  .sub-cancel {
    margin-top: 16px;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--ink);
    padding: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 480;
    font-variation-settings: 'wght' 480;
    font-family: inherit;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  /* =========================================================================
     Photo screen
     ========================================================================= */
  .mode-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--hairline);
    padding: 20px 24px;
    border-radius: 16px;
    margin-bottom: 24px;
    background: var(--canvas);
    gap: 16px;
  }
  .mode-bar .name {
    font-size: 22px;
    font-weight: 540;
    font-variation-settings: 'wght' 540;
    color: var(--ink);
    letter-spacing: -0.4px;
    line-height: 1.2;
  }
  .mode-bar .sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink);
    margin-top: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0.65;
  }
  .change-btn {
    background: var(--canvas);
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 8px 20px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 480;
    font-variation-settings: 'wght' 480;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.1px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .change-btn:hover { background: var(--surface-soft); }
  .change-btn:active { transform: scale(0.98); }

  .canvas-wrap {
    position: relative;
    width: 100%;
    background: var(--canvas);
    border-radius: 24px;
    overflow: hidden;
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--hairline);
  }
  #resultCanvas {
    display: block;
    width: 100%;
    height: auto;
    max-height: 70vh;
    object-fit: contain;
  }
  #resultCanvas.hidden { display: none; }

  .empty-state {
    color: var(--ink);
    line-height: 1.5;
    text-align: center;
    padding: 96px 32px;
  }
  .empty-state .icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 28px;
    display: block;
    color: var(--ink);
    opacity: 0.35;
  }
  .empty-state .message {
    font-size: 28px;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.5px;
    line-height: 1.15;
  }
  .empty-state .hint {
    color: var(--ink);
    display: block;
    font-size: 15px;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    opacity: 0.5;
    letter-spacing: -0.1px;
  }

  .loading {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    font-size: 17px;
    font-weight: 480;
    font-variation-settings: 'wght' 480;
    letter-spacing: -0.2px;
  }
  .loading.hidden { display: none; }

  /* =========================================================================
     Actions — pill primary + secondary
     ========================================================================= */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 24px 0;
  }
  .actions button {
    background: var(--ink);
    color: var(--inverse-ink);
    border: none;
    padding: 16px 24px;
    border-radius: 9999px;
    font-size: 17px;
    font-weight: 480;
    font-variation-settings: 'wght' 480;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.15px;
    line-height: 1.2;
    transition: opacity 0.15s, transform 0.12s;
  }
  .actions button:hover { opacity: 0.9; }
  .actions button:active { transform: scale(0.98); }
  .actions button.secondary {
    background: var(--canvas);
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .actions button.secondary:hover { background: var(--surface-soft); }
  .actions button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* =========================================================================
     Summary — color block
     ========================================================================= */
  .summary {
    margin-top: 24px;
    padding: 48px 40px;
    border-radius: 24px;
    background: var(--surface-soft);
    color: var(--ink);
    border: none;
  }
  .summary.hidden { display: none; }
  .summary.ok   { background: var(--block-lime); }
  .summary.warn { background: var(--block-lilac); }
  .summary.ng   { background: var(--block-coral); }
  .summary .label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.7;
  }
  .summary .message {
    font-size: 40px;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    letter-spacing: -0.8px;
    line-height: 1.05;
    margin: 0;
  }

  /* =========================================================================
     Check list
     ========================================================================= */
  .check-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
  }
  .check {
    background: var(--canvas);
    padding: 24px;
    border-radius: 16px;
    border: 1px solid var(--hairline);
  }
  .check .head {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .check .value {
    font-size: 22px;
    font-weight: 480;
    font-variation-settings: 'wght' 480;
    letter-spacing: -0.4px;
    margin: 10px 0 6px;
    color: var(--ink);
    line-height: 1.3;
  }
  .check .detail {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.55;
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    opacity: 0.65;
    letter-spacing: -0.1px;
  }
  .check.ok   { background: #f5fbe8; border-color: #d4fb7b; }
  .check.warn { background: #f8f4ff; border-color: #d5c8ff; }
  .check.ng   { background: #fff3f0; border-color: #ffb3a3; }
  .check.disabled { opacity: 0.45; }

  /* =========================================================================
     Legend
     ========================================================================= */
  .legend {
    margin-top: 24px;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.7;
    padding: 20px 24px;
    border-radius: 16px;
    border: 1px solid var(--hairline);
    font-weight: 340;
    font-variation-settings: 'wght' 340;
    background: var(--canvas);
  }
  .legend .row { display: flex; align-items: center; gap: 10px; }
  .swatch {
    display: inline-block;
    width: 16px; height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend .hint {
    margin-top: 10px;
    opacity: 0.5;
    font-size: 13px;
    letter-spacing: -0.1px;
  }

  /* =========================================================================
     Mobile
     ========================================================================= */
  @media (max-width: 768px) {
    header { padding: 14px 20px; }
    header .brand { font-size: 16px; }
    header .tag { display: none; }
    .screen { padding: 48px 20px; }
    .mode-screen h2 { font-size: 44px; letter-spacing: -1px; margin-bottom: 40px; }
    .mode-btn { min-height: 180px; padding: 28px 24px 24px; }
    .mode-btn .title { font-size: 24px; letter-spacing: -0.4px; }
    .mode-btn .arrow { font-size: 20px; }
    .privacy-block { padding: 32px 24px; margin-top: 56px; }
    .privacy-block p { font-size: 18px; }
    .sub-card { padding: 36px 24px 24px; }
    .sub-card h3 { font-size: 28px; letter-spacing: -0.5px; }
    .summary { padding: 32px 24px; }
    .summary .message { font-size: 28px; letter-spacing: -0.5px; }
    .empty-state { padding: 64px 24px; }
    .empty-state .message { font-size: 22px; }
    .mode-bar { padding: 16px 20px; }
    .mode-bar .name { font-size: 18px; }
  }
  @media (max-width: 480px) {
    .mode-grid { grid-template-columns: 1fr; }
    .sub-card .options { grid-template-columns: 1fr; }
    .actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">身だしなみセルフチェック</div>
  <div class="tag">Uniform Checker</div>
</header>

<!-- ===== Mode selection ===== -->
<section id="modeScreen" class="screen mode-screen">
  <div class="eyebrow">Step 01 — Choose Mode</div>
  <h2>今日はどの制服？</h2>
  <div id="modeGrid" class="mode-grid"></div>
  <div class="privacy-block">
    <div class="eyebrow">Privacy</div>
    <p>写真はすべてこの端末の中だけで処理されます。外部に送信されることはありません。</p>
  </div>
</section>

<!-- ===== Sub-question modal ===== -->
<div id="subOverlay" class="sub-overlay hidden">
  <div class="sub-card">
    <div class="eyebrow">Quick Question</div>
    <h3 id="subQuestion">—</h3>
    <div class="options" id="subOptions"></div>
    <button class="sub-cancel" id="subCancel">キャンセル</button>
  </div>
</div>

<!-- ===== Photo screen ===== -->
<section id="photoScreen" class="screen hidden">
  <div class="mode-bar">
    <div>
      <div class="name" id="modeName">—</div>
      <div class="sub" id="modeSub">—</div>
    </div>
    <button class="change-btn" id="changeMode">変更</button>
  </div>

  <div class="canvas-wrap">
    <div class="empty-state" id="emptyState">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.17a2 2 0 0 0 1.42-.59l1.83-1.83a2 2 0 0 1 1.42-.59h2.32a2 2 0 0 1 1.42.59l1.83 1.83a2 2 0 0 0 1.42.59H19a2 2 0 0 1 2 2v11Z"/>
        <circle cx="12" cy="13" r="3.2"/>
      </svg>
      <div class="message">写真を撮るかアルバムから選ぼう</div>
      <span class="hint">全身が映った写真を解析します</span>
    </div>
    <canvas id="resultCanvas" class="hidden"></canvas>
    <div class="loading hidden" id="loading">解析中…</div>
  </div>

  <div class="actions">
    <button id="cameraBtn">カメラで撮影</button>
    <button id="galleryBtn" class="secondary">アルバムから選ぶ</button>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="galleryInput" accept="image/*" hidden>

  <div class="summary hidden" id="summary"></div>

  <div class="check-list" id="checkList"></div>

  <div class="legend">
    <div class="row"><span class="swatch" style="background:#000000;"></span>膝の高さ（基準線）</div>
    <div class="row"><span class="swatch" style="background:#22c55e;"></span>スカートの裾（推定）</div>
    <div class="row"><span class="swatch" style="background:#e11d48;"></span>ソックスの上端（推定）</div>
    <div class="hint">
      全身（頭〜足元）が入った正面写真を、無地の背景・自然光で撮ると精度が上がります。
    </div>
  </div>
</section>

<script type="module">
  import {
    PoseLandmarker,
    FilesetResolver,
    DrawingUtils
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  let rules = null;
  let selectedMode = null;
  let selectedBottomsType = null;
  let selectedShirtType = null;
  let poseLandmarker = null;

  const modeScreen = document.getElementById('modeScreen');
  const photoScreen = document.getElementById('photoScreen');
  const modeGrid = document.getElementById('modeGrid');
  const subOverlay = document.getElementById('subOverlay');
  const subCancel = document.getElementById('subCancel');
  const modeName = document.getElementById('modeName');
  const modeSub = document.getElementById('modeSub');
  const changeMode = document.getElementById('changeMode');
  const cameraBtn = document.getElementById('cameraBtn');
  const galleryBtn = document.getElementById('galleryBtn');
  const cameraInput = document.getElementById('cameraInput');
  const galleryInput = document.getElementById('galleryInput');
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const emptyState = document.getElementById('emptyState');
  const loading = document.getElementById('loading');
  const checkList = document.getElementById('checkList');
  const summary = document.getElementById('summary');

  const sampleCanvas = document.createElement('canvas');
  const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

  const BRAND_COLORS = ['navy', 'lilac', 'cream', 'mint', 'coral', 'pink'];

  async function init() {
    try {
      const res = await fetch('rules.json');
      rules = await res.json();
    } catch (e) {
      modeGrid.innerHTML = '<div style="grid-column: 1/-1; color: #c43820; padding: 24px; text-align: center; background: #fff1ee; border-radius: 16px;">' +
        'rules.json の読み込みに失敗しました。localhost 経由で開いているか確認してください。</div>';
      return;
    }
    buildModeGrid();
  }

  function buildModeGrid() {
    modeGrid.innerHTML = '';
    rules.modes.forEach((mode, i) => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn';
      btn.dataset.color = BRAND_COLORS[i % BRAND_COLORS.length];
      btn.innerHTML = `
        <div>
          <div class="mode-eyebrow">${mode.season_label}</div>
          <div class="title">${mode.label}</div>
        </div>
        <div class="arrow">→</div>
      `;
      btn.addEventListener('click', () => handleModeClick(mode));
      modeGrid.appendChild(btn);
    });
  }

  function handleModeClick(mode) {
    selectedMode = mode;
    selectedBottomsType = null;
    selectedShirtType = null;
    proceedToNextSubQuestion();
  }

  function proceedToNextSubQuestion() {
    if (selectedMode.needs_bottoms_type && !selectedBottomsType) {
      showSubModal('ボトムスはどちらですか？', [
        { label: 'スカート', value: 'skirt' },
        { label: 'ズボン',   value: 'pants' }
      ], (val) => {
        selectedBottomsType = val;
        proceedToNextSubQuestion();
      });
      return;
    }
    if (selectedMode.needs_shirt_type && !selectedShirtType) {
      showSubModal('シャツの種類は？', [
        { label: 'Yシャツ',    value: 'shirt' },
        { label: 'ポロシャツ', value: 'polo' }
      ], (val) => {
        selectedShirtType = val;
        proceedToNextSubQuestion();
      });
      return;
    }
    goToPhotoScreen();
  }

  function showSubModal(question, options, onSelect) {
    document.getElementById('subQuestion').textContent = question;
    const optsEl = document.getElementById('subOptions');
    optsEl.innerHTML = '';
    for (const opt of options) {
      const btn = document.createElement('button');
      btn.className = 'sub-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        subOverlay.classList.add('hidden');
        onSelect(opt.value);
      });
      optsEl.appendChild(btn);
    }
    subOverlay.classList.remove('hidden');
  }

  subCancel.addEventListener('click', () => {
    selectedMode = null;
    selectedBottomsType = null;
    selectedShirtType = null;
    subOverlay.classList.add('hidden');
  });

  changeMode.addEventListener('click', () => {
    photoScreen.classList.add('hidden');
    modeScreen.classList.remove('hidden');
    selectedMode = null;
    selectedBottomsType = null;
    selectedShirtType = null;
    canvas.classList.add('hidden');
    emptyState.style.display = '';
    summary.classList.add('hidden');
  });

  function goToPhotoScreen() {
    modeScreen.classList.add('hidden');
    photoScreen.classList.remove('hidden');
    modeName.textContent = selectedMode.label;
    let sub = selectedMode.season_label;
    if (selectedBottomsType) {
      sub += ' / ' + (selectedBottomsType === 'skirt' ? 'スカート' : 'ズボン');
    }
    if (selectedShirtType) {
      sub += ' / ' + (selectedShirtType === 'shirt' ? 'Yシャツ' : 'ポロシャツ');
    }
    modeSub.textContent = sub;
    canvas.classList.add('hidden');
    emptyState.style.display = '';
    summary.classList.add('hidden');
    renderCheckList();
  }

  function getEffectiveChecks() {
    if (selectedMode.checks_by_bottoms) {
      return selectedMode.checks_by_bottoms[selectedBottomsType] || {};
    }
    return selectedMode.checks || {};
  }

  function renderCheckList() {
    checkList.innerHTML = '';
    const c = getEffectiveChecks();

    addCheck('skirt', 'スカート丈',
      c.skirt_length === true ? '計測待ち' : '対象外',
      c.skirt_length === true ? null : 'disabled', '');

    const sockRule = c.sock_length;
    if (!sockRule) {
      addCheck('sock', 'ソックス丈', '対象外', 'disabled', '');
    } else if (sockRule.mode === 'notice') {
      addCheck('sock', 'ソックス丈', '自分で確認してね', 'warn',
        sockRule.message || 'ズボンに隠れて見えないので、自分でチェックしてね');
    } else {
      addCheck('sock', 'ソックス丈', '計測待ち', null, sockRule.notes || '');
    }

    if (c.under_jacket) {
      addCheck('under_jacket', 'ジャケットの下', '計測待ち', null, c.under_jacket.notes || '');
    }
  }

  function addCheck(id, title, value, level, detail) {
    const div = document.createElement('div');
    div.className = 'check' + (level ? ' ' + level : '');
    div.id = 'check-' + id;
    div.innerHTML = `
      <div class="head">${title}</div>
      <div class="value">${value}</div>
      <div class="detail">${detail}</div>
    `;
    checkList.appendChild(div);
  }

  function updateCheck(id, level, value, detail) {
    const el = document.getElementById('check-' + id);
    if (!el) return;
    el.className = 'check' + (level ? ' ' + level : '');
    el.querySelector('.value').textContent = value;
    el.querySelector('.detail').textContent = detail;
  }

  // ===== File handling =====
  cameraBtn.addEventListener('click', () => cameraInput.click());
  galleryBtn.addEventListener('click', () => galleryInput.click());
  cameraInput.addEventListener('change', e => handleFile(e.target.files[0]));
  galleryInput.addEventListener('change', e => handleFile(e.target.files[0]));

  async function handleFile(file) {
    if (!file) return;
    loading.classList.remove('hidden');
    summary.classList.add('hidden');
    try {
      if (!poseLandmarker) await initPose();
      const bitmap = await createImageBitmap(file);
      await analyzeImage(bitmap);
    } catch (err) {
      console.error(err);
      alert('解析エラー: ' + (err.message || err));
    } finally {
      loading.classList.add('hidden');
    }
  }

  async function initPose() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "IMAGE",
      numPoses: 1
    });
  }

  // ===== Image analysis =====
  async function analyzeImage(bitmap) {
    canvas.width = bitmap.width;
    canvas.height = bitmap.height;
    sampleCanvas.width = bitmap.width;
    sampleCanvas.height = bitmap.height;

    ctx.drawImage(bitmap, 0, 0);
    sampleCtx.drawImage(bitmap, 0, 0);

    emptyState.style.display = 'none';
    canvas.classList.remove('hidden');

    const result = poseLandmarker.detect(bitmap);
    const checks = getEffectiveChecks();

    if (!result.landmarks || result.landmarks.length === 0) {
      drawError('人がうつってないみたい');
      if (checks.skirt_length === true) updateCheck('skirt', 'warn', '人物が見つかりません', '');
      const sr = checks.sock_length;
      if (sr && sr.mode !== 'notice')   updateCheck('sock',  'warn', '人物が見つかりません', '');
      if (checks.under_jacket)          updateCheck('under_jacket', 'warn', '人物が見つかりません', '');
      showSummary('warn', 'だれもうつっていません');
      return;
    }

    const lm = result.landmarks[0];
    drawSkeleton(lm);

    const results = [];
    if (checks.skirt_length === true) {
      results.push(checkSkirt(lm));
    }
    const sockRule = checks.sock_length;
    if (sockRule && sockRule.mode !== 'notice') {
      results.push(checkSock(lm, sockRule));
    }
    if (checks.under_jacket) {
      results.push(checkUnderJacket(lm, checks.under_jacket));
    }

    const hasNg   = results.some(r => r === 'ng');
    const hasWarn = results.some(r => r === 'warn');
    if (results.length === 0) showSummary('warn', '確認するところがありません');
    else if (hasNg)   showSummary('ng',   'ちょっと直したいところがあります');
    else if (hasWarn) showSummary('warn', 'もうちょっと整えてみよう');
    else              showSummary('ok',   'ばっちり。今日もきれい。');
  }

  function showSummary(level, text) {
    summary.className = 'summary ' + level;
    summary.innerHTML = `
      <div class="label">Result</div>
      <div class="message">${text}</div>
    `;
    summary.classList.remove('hidden');
  }

  function drawError(msg) {
    const fontSize = Math.floor(canvas.width / 28);
    const padding = fontSize * 0.6;
    ctx.font = `500 ${fontSize}px Inter, sans-serif`;
    const w = ctx.measureText(msg).width + padding * 2;
    ctx.fillStyle = '#000000';
    ctx.fillRect(canvas.width/2 - w/2, canvas.height/2 - fontSize, w, fontSize * 2);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(msg, canvas.width/2, canvas.height/2);
  }

  function drawSkeleton(lm) {
    const drawingUtils = new DrawingUtils(ctx);
    drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {
      color: 'rgba(0,0,0,0.45)',
      lineWidth: Math.max(2, canvas.width / 400)
    });
    drawingUtils.drawLandmarks(lm, {
      radius: Math.max(2, canvas.width / 250),
      color: '#000000'
    });
  }

  function drawHorizontalLine(y, color, dashed = false) {
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2, canvas.width / 300);
    if (dashed) ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(0, y * canvas.height);
    ctx.lineTo(canvas.width, y * canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawLabel(text, y, color) {
    const fontSize = Math.max(14, Math.floor(canvas.width / 38));
    ctx.font = `500 ${fontSize}px Inter, sans-serif`;
    const padding = fontSize * 0.4;
    const w = ctx.measureText(text).width + padding * 2;
    const yPx = y * canvas.height;
    ctx.fillStyle = color;
    ctx.fillRect(0, yPx - fontSize - padding/2, w, fontSize + padding);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, padding, yPx - fontSize/2);
  }

  function drawSampleBox(cxNorm, cyNorm, halfW, halfH, color, label) {
    const px = cxNorm * canvas.width;
    const py = cyNorm * canvas.height;
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2, canvas.width / 280);
    ctx.strokeRect(px - halfW, py - halfH, halfW * 2, halfH * 2);
    if (label) {
      const fontSize = Math.max(13, Math.floor(canvas.width / 48));
      ctx.font = `500 ${fontSize}px Inter, sans-serif`;
      const padding = fontSize * 0.35;
      const labelW = ctx.measureText(label).width + padding * 2;
      ctx.fillStyle = color;
      ctx.fillRect(px + halfW + 6, py - halfH, labelW, fontSize + padding);
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(label, px + halfW + 6 + padding, py - halfH + padding/2);
    }
  }

  // ===== Sampling helpers =====
  function sampleColumn(sctx, cx, y0, y1, halfStrip, w, h) {
    const x0 = Math.max(0, cx - halfStrip);
    const x1 = Math.min(w, cx + halfStrip + 1);
    const yA = Math.max(0, y0);
    const yB = Math.min(h, y1);
    if (x1 <= x0 || yB <= yA) return null;
    const data = sctx.getImageData(x0, yA, x1 - x0, yB - yA).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i]; g += data[i+1]; b += data[i+2]; n++;
    }
    return n > 0 ? { r: r/n, g: g/n, b: b/n } : null;
  }

  function colorDelta(a, b) {
    const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
    return Math.sqrt(dr*dr + dg*dg + db*db);
  }

  // ===== Skirt check =====
  function checkSkirt(lm) {
    const lh = lm[23], rh = lm[24];
    const lk = lm[25], rk = lm[26];
    const la = lm[27], ra = lm[28];
    if (!lh || !rh || !lk || !rk || (lk.visibility ?? 1) < 0.4 || (rk.visibility ?? 1) < 0.4) {
      updateCheck('skirt', 'warn', '膝が見つかりません', '下半身もしっかり画角に入れてください');
      return 'warn';
    }
    const kneeY = (lk.y + rk.y) / 2;
    const ankleY = ((la?.y ?? kneeY + 0.15) + (ra?.y ?? kneeY + 0.15)) / 2;
    const hipY = (lh.y + rh.y) / 2;

    drawHorizontalLine(kneeY, '#000000', true);
    drawLabel('膝の高さ', kneeY, '#000000');

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const cx = (lh.x + rh.x) / 2;
    const px = Math.floor(cx * w);
    const startY = Math.floor((hipY + (kneeY - hipY) * 0.25) * h);
    const endY   = Math.floor((kneeY + (ankleY - kneeY) * 0.5) * h);

    const baseline = sampleColumn(sampleCtx, px, startY, startY + 8, 6, w, h);
    if (!baseline) {
      updateCheck('skirt', 'warn', '計測できません', '色をうまく読み取れませんでした');
      return 'warn';
    }
    const THRESHOLD = 45;
    const REQUIRED = 4;
    let consec = 0;
    let hemY = -1;
    for (let y = startY + 8; y < endY && y < h; y++) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, 6, w, h);
      if (!row) continue;
      if (colorDelta(row, baseline) > THRESHOLD) {
        if (++consec >= REQUIRED) {
          hemY = (y - REQUIRED) / h;
          break;
        }
      } else { consec = 0; }
    }

    if (hemY < 0) {
      updateCheck('skirt', 'warn', '裾が見つかりません', '黒の線が膝の高さです。目視で確認してください。');
      return 'warn';
    }

    drawHorizontalLine(hemY, '#22c55e');
    drawLabel('スカート裾', hemY, '#22c55e');

    const kneeAnkle = ankleY - kneeY;
    if (kneeAnkle <= 0.01) {
      updateCheck('skirt', 'warn', '計測できません', '');
      return 'warn';
    }
    const cm = ((hemY - kneeY) / kneeAnkle) * 40;
    if (cm < -3) {
      updateCheck('skirt', 'ng', `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`, 'ちょっと短いかも。下げてみよう。');
      return 'ng';
    } else if (cm < -0.5) {
      updateCheck('skirt', 'warn', `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`, 'もうちょっとだけ下げてみよう。');
      return 'warn';
    } else if (cm < 1.5) {
      updateCheck('skirt', 'warn', '膝の高さ付近', 'ちょうど膝の位置です。');
      return 'warn';
    } else {
      updateCheck('skirt', 'ok', `膝より約 ${cm.toFixed(1)} cm 下`, 'ばっちりです。');
      return 'ok';
    }
  }

  // ===== Sock check =====
  function checkSock(lm, rule) {
    const lk = lm[25], rk = lm[26];
    const la = lm[27], ra = lm[28];
    const lConf = ((lk?.visibility ?? 0) + (la?.visibility ?? 0)) / 2;
    const rConf = ((rk?.visibility ?? 0) + (ra?.visibility ?? 0)) / 2;
    let knee, ankle;
    if (lConf >= rConf && lConf > 0.4) { knee = lk; ankle = la; }
    else if (rConf > 0.4)               { knee = rk; ankle = ra; }
    else {
      updateCheck('sock', 'warn', '足が見つかりません', '足元も画角に入れてください。');
      return 'warn';
    }
    if (!ankle || ankle.y <= knee.y) {
      updateCheck('sock', 'warn', '計測できません', '');
      return 'warn';
    }

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const px = Math.floor(((knee.x + ankle.x) / 2) * w);
    const yLow  = Math.floor((ankle.y - 0.02) * h);
    const yHigh = Math.floor((knee.y + 0.02) * h);
    if (yLow <= yHigh) {
      updateCheck('sock', 'warn', '計測できません', '');
      return 'warn';
    }

    const baseline = sampleColumn(sampleCtx, px, yLow - 10, yLow, 6, w, h);
    if (!baseline) {
      updateCheck('sock', 'warn', '計測できません', '');
      return 'warn';
    }

    const THRESHOLD = 35;
    const REQUIRED = 3;
    let consec = 0;
    let sockTopY = knee.y;
    for (let y = yLow - 1; y >= yHigh; y--) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, 6, w, h);
      if (!row) continue;
      if (colorDelta(row, baseline) > THRESHOLD) {
        if (++consec >= REQUIRED) {
          sockTopY = (y + REQUIRED) / h;
          break;
        }
      } else { consec = 0; }
    }

    drawHorizontalLine(sockTopY, '#e11d48');
    drawLabel('ソックス上端', sockTopY, '#e11d48');

    const covered = Math.max(0, Math.min(1, 1 - (sockTopY - knee.y) / (ankle.y - knee.y)));
    const cls = covered > 0.75 ? 'high' : covered > 0.35 ? 'short' : 'ankle';
    const expected = Array.isArray(rule.expected) ? rule.expected : [rule.expected];
    const ankleForbidden = rule.ankle_forbidden === true;

    let label;
    if (cls === 'high') label = 'ハイソックス';
    else if (cls === 'short') label = '短めソックス';
    else label = 'くるぶし丈';

    const pct = `膝〜足首間で${Math.round(covered * 100)}%カバー`;

    if (cls === 'ankle' && (ankleForbidden || !expected.includes('ankle'))) {
      updateCheck('sock', 'ng', label, `くるぶし丈はこのモードでは規定外。ハイソックスにしましょう（${pct}）`);
      return 'ng';
    }
    if (expected.includes(cls)) {
      updateCheck('sock', 'ok', label, `規定どおり（${pct}）`);
      return 'ok';
    }
    if (expected.includes('high') && cls === 'short') {
      updateCheck('sock', 'ng', label, `このモードはハイソックスが必須です（${pct}）`);
      return 'ng';
    }
    if (expected.includes('short') && cls === 'high') {
      updateCheck('sock', 'warn', label, `想定より長いソックスです（${pct}）`);
      return 'warn';
    }
    updateCheck('sock', 'warn', label, `想定外の丈です（${pct}）`);
    return 'warn';
  }

  // ===== Under-jacket check =====
  function checkUnderJacket(lm, rule) {
    const ls = lm[11], rs = lm[12];
    const lh = lm[23], rh = lm[24];
    if (!ls || !rs || !lh || !rh ||
        (ls.visibility ?? 1) < 0.4 || (rs.visibility ?? 1) < 0.4) {
      updateCheck('under_jacket', 'warn', '上半身が見えません', '肩から胸までを画角に入れてください。');
      return 'warn';
    }

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const shoulderY = (ls.y + rs.y) / 2;
    const hipY      = (lh.y + rh.y) / 2;
    const chestX    = (ls.x + rs.x) / 2;
    const torsoH    = hipY - shoulderY;
    if (torsoH <= 0.05) {
      updateCheck('under_jacket', 'warn', '計測できません', '');
      return 'warn';
    }

    const vY = shoulderY + torsoH * 0.25;
    const jacketX = ls.x * 0.7 + chestX * 0.3;

    const halfX = Math.max(4, Math.floor(w * 0.018));
    const halfY = Math.max(4, Math.floor(h * 0.012));
    const vCx  = Math.floor(chestX  * w);
    const jCx  = Math.floor(jacketX * w);
    const vCy  = Math.floor(vY * h);

    const vSample = sampleColumn(sampleCtx, vCx, vCy - halfY, vCy + halfY, halfX, w, h);
    const jSample = sampleColumn(sampleCtx, jCx, vCy - halfY, vCy + halfY, halfX, w, h);
    if (!vSample || !jSample) {
      updateCheck('under_jacket', 'warn', '計測できません', '');
      return 'warn';
    }

    drawSampleBox(chestX,  vY, halfX, halfY, '#7c3aed', 'V開口部');
    drawSampleBox(jacketX, vY, halfX * 0.8, halfY * 0.8, 'rgba(124,58,237,0.45)', '');

    const vBright = (vSample.r + vSample.g + vSample.b) / 3;
    const jBright = (jSample.r + jSample.g + jSample.b) / 3;
    const delta = vBright - jBright;

    if (rule.expected_visible === 'shirt') {
      if (delta > 50) {
        updateCheck('under_jacket', 'ok', 'Yシャツのみ',
          `ジャケットの下にYシャツが見えています。正装の通り（明度差 ${Math.round(delta)}）`);
        return 'ok';
      } else if (delta > 15) {
        updateCheck('under_jacket', 'warn', '判定が難しい',
          `明度差が小さく確実に判定できません。明るいところで撮り直してください（差 ${Math.round(delta)}）`);
        return 'warn';
      } else {
        updateCheck('under_jacket', 'ng', 'ベスト/セーターありそう',
          `正装はYシャツのみです。ベストかセーターを脱いでください（差 ${Math.round(delta)}）`);
        return 'ng';
      }
    }

    if (rule.expected_visible === 'navy_layer') {
      if (Math.abs(delta) < 20) {
        updateCheck('under_jacket', 'ok', '紺の層を確認',
          `紺の層がジャケットの下に見えています（明度差 ${Math.round(delta)}）`);
        return 'ok';
      } else if (delta > 50) {
        updateCheck('under_jacket', 'ng', 'ベストが見えません',
          `Yシャツだけになっていないか、ベストの着用を確認してください（差 ${Math.round(delta)}）`);
        return 'ng';
      } else {
        updateCheck('under_jacket', 'warn', '判定が難しい', '');
        return 'warn';
      }
    }

    updateCheck('under_jacket', 'warn', '判定対象外', '');
    return 'warn';
  }

  init();
</script>

</body>
</html>
