<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>身だしなみセルフチェック - Phase 1</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    background: #2a2a2a;
    padding: 12px 16px;
    text-align: center;
    border-bottom: 1px solid #333;
  }
  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .phase {
    font-size: 11px;
    color: #888;
    margin-top: 3px;
  }
  .container {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 3 / 4;
    background: #000;
    margin-top: 12px;
    overflow: hidden;
  }
  video, canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  video {
    transform: scaleX(-1);
  }
  canvas {
    transform: scaleX(-1);
    pointer-events: none;
  }
  .controls {
    width: 100%;
    max-width: 480px;
    padding: 12px 16px;
  }
  .status {
    background: #2a2a2a;
    padding: 14px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    border-left: 4px solid #555;
    transition: border-color 0.2s;
  }
  .status .label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status .value {
    font-size: 20px;
    font-weight: 700;
    margin: 4px 0 6px;
  }
  .status .detail {
    color: #aaa;
    font-size: 13px;
    line-height: 1.5;
  }
  .status.ok { border-left-color: #4ade80; }
  .status.ok .value { color: #4ade80; }
  .status.warn { border-left-color: #fbbf24; }
  .status.warn .value { color: #fbbf24; }
  .status.ng { border-left-color: #f87171; }
  .status.ng .value { color: #f87171; }
  button {
    width: 100%;
    background: #3b82f6;
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:active { background: #2563eb; }
  button:disabled {
    background: #444;
    cursor: not-allowed;
    opacity: 0.6;
  }
  .legend {
    margin-top: 14px;
    font-size: 12px;
    color: #888;
    line-height: 1.7;
    background: #222;
    padding: 12px 14px;
    border-radius: 6px;
  }
  .swatch {
    display: inline-block;
    width: 14px;
    height: 3px;
    margin-right: 8px;
    vertical-align: middle;
    border-radius: 1px;
  }
  .note {
    margin-top: 8px;
    color: #777;
    font-size: 11px;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>身だしなみセルフチェック</h1>
  <div class="phase">Phase 1 ／ スカート丈チェック（プロトタイプ）</div>
</header>

<div class="container">
  <div class="placeholder" id="placeholder">
    「カメラを起動」を押してください<br>
    <small style="color:#444; margin-top:8px; display:block;">画像は端末内のみで処理され、外部に送信されません</small>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div class="controls">
  <div class="status" id="status">
    <div class="label">状態</div>
    <div class="value" id="statusValue">待機中</div>
    <div class="detail" id="statusDetail">「カメラを起動」を押すとチェックを開始します</div>
  </div>

  <button id="startBtn">カメラを起動</button>

  <div class="legend">
    <div><span class="swatch" style="background:#fbbf24;"></span>黄色：膝の高さ（基準線）</div>
    <div><span class="swatch" style="background:#06b6d4;"></span>水色：スカートの裾（推定）</div>
    <div class="note">
      ・全身が映るように足元から頭まで入れて立ってください<br>
      ・無地・明るい背景の前で撮影すると精度が上がります<br>
      ・タイツ／黒ストッキング着用時は誤判定する場合があります
    </div>
  </div>
</div>

<script type="module">
  import {
    PoseLandmarker,
    FilesetResolver,
    DrawingUtils
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const placeholder = document.getElementById('placeholder');
  const statusBox = document.getElementById('status');
  const statusValue = document.getElementById('statusValue');
  const statusDetail = document.getElementById('statusDetail');

  // Hidden canvas for pixel sampling
  const sampleCanvas = document.createElement('canvas');
  const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

  let poseLandmarker = null;
  let running = false;
  let lastVideoTime = -1;
  let smoothedHemY = null;

  function setStatus(level, value, detail) {
    statusBox.className = 'status' + (level ? ' ' + level : '');
    statusValue.textContent = value;
    statusDetail.textContent = detail;
  }

  async function initPose() {
    setStatus('', 'モデル読み込み中...', '初回は数秒かかります');
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
  }

  async function initCamera() {
    setStatus('', 'カメラ起動中...', 'カメラの使用を許可してください');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width:  { ideal: 720 },
        height: { ideal: 1280 }
      },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(resolve => {
      if (video.readyState >= 2) return resolve();
      video.onloadedmetadata = resolve;
    });
    await video.play();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    sampleCanvas.width = video.videoWidth;
    sampleCanvas.height = video.videoHeight;
    placeholder.style.display = 'none';
  }

  /**
   * Detect skirt hem y-position by scanning vertically from below the hip
   * downward, finding the first significant color transition.
   * Returns normalized y in [0,1], or -1 if not found.
   */
  function detectSkirtHem(landmarks) {
    const lh = landmarks[23], rh = landmarks[24];
    const lk = landmarks[25], rk = landmarks[26];
    if (!lh || !rh || !lk || !rk) return -1;

    const cx = (lh.x + rh.x) / 2;
    const hipY = (lh.y + rh.y) / 2;
    const kneeY = (lk.y + rk.y) / 2;
    if (kneeY <= hipY) return -1;

    sampleCtx.drawImage(video, 0, 0, sampleCanvas.width, sampleCanvas.height);
    const w = sampleCanvas.width;
    const h = sampleCanvas.height;

    // start scan 25% below hip toward knee (skip waistband/jacket boundary)
    const startY = Math.floor((hipY + (kneeY - hipY) * 0.25) * h);
    // end scan 50% below knee toward ankle (skirt rarely below mid-calf)
    const ankleY = ((landmarks[27]?.y ?? kneeY) + (landmarks[28]?.y ?? kneeY)) / 2;
    const endY = Math.floor((kneeY + (ankleY - kneeY) * 0.5) * h);

    const px = Math.floor(cx * w);
    const halfStrip = 5;

    // sample baseline color from the area just below the hip (skirt color)
    const baseline = sampleColumn(sampleCtx, px, startY, startY + 8, halfStrip, w, h);
    if (!baseline) return -1;

    // walk downward, compare each row to baseline
    const COLOR_THRESHOLD = 45;
    let consecutive = 0;
    const REQUIRED_CONSECUTIVE = 4;

    for (let y = startY + 8; y < endY && y < h; y++) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, halfStrip, w, h);
      if (!row) continue;
      const dr = row.r - baseline.r;
      const dg = row.g - baseline.g;
      const db = row.b - baseline.b;
      const delta = Math.sqrt(dr*dr + dg*dg + db*db);
      if (delta > COLOR_THRESHOLD) {
        consecutive++;
        if (consecutive >= REQUIRED_CONSECUTIVE) {
          return (y - REQUIRED_CONSECUTIVE) / h;
        }
      } else {
        consecutive = 0;
      }
    }
    return -1;
  }

  function sampleColumn(sctx, cx, y0, y1, halfStrip, w, h) {
    const x0 = Math.max(0, cx - halfStrip);
    const x1 = Math.min(w, cx + halfStrip + 1);
    const yA = Math.max(0, y0);
    const yB = Math.min(h, y1);
    if (x1 <= x0 || yB <= yA) return null;
    const data = sctx.getImageData(x0, yA, x1 - x0, yB - yA).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i]; g += data[i+1]; b += data[i+2]; n++;
    }
    return n > 0 ? { r: r/n, g: g/n, b: b/n } : null;
  }

  function draw(result) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!result.landmarks || result.landmarks.length === 0) {
      setStatus('warn', '人物を検出中...', '全身がカメラに映るように立ってください');
      smoothedHemY = null;
      return;
    }

    const lm = result.landmarks[0];
    const drawingUtils = new DrawingUtils(ctx);

    drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {
      color: 'rgba(255,255,255,0.4)', lineWidth: 2
    });
    drawingUtils.drawLandmarks(lm, { radius: 3, color: '#ffffff' });

    const lk = lm[25], rk = lm[26];
    const la = lm[27], ra = lm[28];
    if (!lk || !rk || (lk.visibility ?? 1) < 0.5 || (rk.visibility ?? 1) < 0.5) {
      setStatus('warn', '膝が検出できません', '下半身がはっきり映るように下がってください');
      smoothedHemY = null;
      return;
    }

    const kneeY  = (lk.y + rk.y) / 2;
    const ankleY = (la && ra) ? (la.y + ra.y) / 2 : kneeY + 0.2;

    // knee reference line (yellow)
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(0, kneeY * canvas.height);
    ctx.lineTo(canvas.width, kneeY * canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    // detect hem
    const rawHemY = detectSkirtHem(lm);
    if (rawHemY < 0) {
      setStatus('warn', '裾が検出できません',
        '黄色の線が膝の高さです。スカートの裾と目視で比較してください。');
      smoothedHemY = null;
      return;
    }

    // exponential smoothing to reduce jitter
    smoothedHemY = smoothedHemY === null ? rawHemY
      : smoothedHemY * 0.7 + rawHemY * 0.3;
    const hemY = smoothedHemY;

    // hem line (cyan)
    ctx.strokeStyle = '#06b6d4';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, hemY * canvas.height);
    ctx.lineTo(canvas.width, hemY * canvas.height);
    ctx.stroke();

    // assume knee-to-ankle ~= 40 cm to convert pixels to centimeters
    const kneeAnkle = ankleY - kneeY;
    if (kneeAnkle <= 0.01) {
      setStatus('warn', '計測できません', '少し下がってカメラから離れてください');
      return;
    }
    const ratio = (hemY - kneeY) / kneeAnkle;
    const cm = ratio * 40;

    if (cm < -3) {
      setStatus('ng',
        `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`,
        'スカート丈が短すぎる可能性があります。下げて再確認してください。');
    } else if (cm < -0.5) {
      setStatus('warn',
        `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`,
        '膝が見えています。基準ぎりぎりです。');
    } else if (cm < 1.5) {
      setStatus('warn',
        `膝の高さ付近（±${Math.max(Math.abs(cm), 0.5).toFixed(1)} cm）`,
        'ちょうど膝の位置です。');
    } else {
      setStatus('ok',
        `膝より約 ${cm.toFixed(1)} cm 下`,
        'スカート丈OK：膝が隠れています。');
    }
  }

  async function loop() {
    if (!running) return;
    if (poseLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      try {
        const result = poseLandmarker.detectForVideo(video, performance.now());
        draw(result);
      } catch (e) {
        console.error(e);
      }
    }
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.textContent = '起動中...';
    try {
      if (!poseLandmarker) await initPose();
      await initCamera();
      running = true;
      startBtn.textContent = '計測中';
      setStatus('', '計測中...', '少し動いて全身がしっかり映るようにしてください');
      loop();
    } catch (err) {
      console.error(err);
      setStatus('ng', 'エラー', err.message || 'カメラまたはモデルの初期化に失敗しました');
      startBtn.disabled = false;
      startBtn.textContent = 'もう一度試す';
    }
  });
</script>

</body>
</html>
