<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#FF4DA0"/>

  <!-- Body — pear-shaped, centered -->
  <ellipse cx="34" cy="42" rx="17" ry="13" fill="#FFD93D"/>

  <!-- Tail — fan-shaped on the back-left -->
  <path d="M 18 36 L 6 30 L 10 38 L 6 42 L 12 46 L 18 46 Z" fill="#FFD93D"/>
  <path d="M 10 30 L 6 30 L 10 38 Z" fill="#FFB300" opacity="0.45"/>
  <path d="M 10 46 L 6 42 L 12 46 Z" fill="#FFB300" opacity="0.45"/>

  <!-- Head — distinctly smaller circle, clearly on top of body -->
  <circle cx="42" cy="22" r="10" fill="#FFD93D"/>

  <!-- Beak — large prominent forward-pointing triangle -->
  <path d="M 56 21 L 48 17 L 48 26 Z" fill="#FF6B00"/>

  <!-- Eye — visible round eye with white highlight -->
  <circle cx="44" cy="20" r="2.6" fill="#1a1530"/>
  <circle cx="44.8" cy="19.2" r="0.8" fill="#FFFFFF"/>

  <!-- Wing — orange shape on body -->
  <path d="M 24 36 Q 38 36 42 50 Q 30 46 24 36 Z" fill="#FFB300"/>

  <!-- Feet — two small orange sticks -->
  <rect x="30" y="54" width="2.8" height="5.5" rx="1" fill="#FF6B00"/>
  <rect x="36" y="54" width="2.8" height="5.5" rx="1" fill="#FF6B00"/>
</svg>
