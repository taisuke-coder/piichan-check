<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>身だしなみセルフチェック - Phase 2</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #1a1a1a; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  header {
    width: 100%;
    background: #2a2a2a;
    padding: 12px 16px;
    text-align: center;
    border-bottom: 1px solid #333;
  }
  h1 { margin: 0; font-size: 16px; font-weight: 600; }
  .phase { font-size: 11px; color: #888; margin-top: 3px; }

  .screen { width: 100%; max-width: 480px; padding: 16px; }
  .screen.hidden { display: none; }

  /* === Mode selection === */
  .mode-screen h2 {
    font-size: 16px; font-weight: 600;
    margin: 8px 0 16px;
    text-align: center;
    color: #ddd;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .mode-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #fff;
    padding: 18px 12px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:active { transform: scale(0.97); background: #333; }
  .mode-btn .icon { font-size: 28px; margin-bottom: 6px; }
  .mode-btn .title { font-size: 14px; font-weight: 700; }
  .mode-btn .sub { font-size: 11px; color: #888; margin-top: 2px; }

  /* === Sub-selection (shirt type) === */
  .sub-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .sub-overlay.hidden { display: none; }
  .sub-card {
    background: #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    max-width: 360px;
    width: 100%;
  }
  .sub-card h3 {
    margin: 0 0 16px;
    font-size: 15px;
    text-align: center;
    color: #ddd;
  }
  .sub-card .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sub-btn {
    background: #3a3a3a;
    border: 1px solid #4a4a4a;
    color: #fff;
    padding: 16px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .sub-btn:active { background: #444; }
  .sub-cancel {
    margin-top: 12px;
    width: 100%;
    background: transparent;
    border: none;
    color: #888;
    padding: 8px;
    cursor: pointer;
    font-size: 13px;
  }

  /* === Camera screen === */
  .mode-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #2a2a2a;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    gap: 12px;
  }
  .mode-bar .name { font-size: 14px; font-weight: 600; }
  .mode-bar .sub { font-size: 11px; color: #888; }
  .change-btn {
    background: #3a3a3a;
    border: none;
    color: #ddd;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .container {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    background: #000;
    overflow: hidden;
    border-radius: 8px;
  }
  video, canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  video { transform: scaleX(-1); }
  canvas { transform: scaleX(-1); pointer-events: none; }
  .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #555; font-size: 13px; text-align: center; padding: 20px;
  }

  .check-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .check {
    background: #2a2a2a;
    padding: 12px 14px;
    border-radius: 8px;
    border-left: 4px solid #555;
    transition: border-color 0.2s;
  }
  .check .head {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #aaa;
  }
  .check .icon-status {
    font-size: 14px;
  }
  .check .value {
    font-size: 16px; font-weight: 700; margin: 4px 0 2px;
  }
  .check .detail {
    font-size: 12px; color: #888; line-height: 1.5;
  }
  .check.ok { border-left-color: #4ade80; }
  .check.ok .value { color: #4ade80; }
  .check.warn { border-left-color: #fbbf24; }
  .check.warn .value { color: #fbbf24; }
  .check.ng { border-left-color: #f87171; }
  .check.ng .value { color: #f87171; }
  .check.disabled {
    opacity: 0.5;
    border-left-color: #444;
  }

  button.primary {
    width: 100%;
    background: #3b82f6;
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }
  button.primary:active { background: #2563eb; }
  button.primary:disabled { background: #444; opacity: 0.6; }

  .legend {
    margin-top: 12px;
    font-size: 11px; color: #777;
    line-height: 1.7;
    background: #222;
    padding: 10px 12px;
    border-radius: 6px;
  }
  .swatch {
    display: inline-block;
    width: 14px; height: 3px;
    margin-right: 6px;
    vertical-align: middle;
    border-radius: 1px;
  }
</style>
</head>
<body>

<header>
  <h1>身だしなみセルフチェック</h1>
  <div class="phase">Phase 2 ／ モード選択 + 丈チェック</div>
</header>

<!-- ===== Mode selection screen ===== -->
<section id="modeScreen" class="screen mode-screen">
  <h2>制服モードを選んでください</h2>
  <div id="modeGrid" class="mode-grid"></div>
  <div class="legend" style="margin-top: 16px;">
    画像はすべて端末内で処理され、外部に送信されません。
  </div>
</section>

<!-- ===== Shirt sub-selection overlay (summer modes) ===== -->
<div id="subOverlay" class="sub-overlay hidden">
  <div class="sub-card">
    <h3>シャツの種類を選んでください</h3>
    <div class="options">
      <button class="sub-btn" data-shirt="shirt">Yシャツ</button>
      <button class="sub-btn" data-shirt="polo">ポロシャツ</button>
    </div>
    <button class="sub-cancel" id="subCancel">キャンセル</button>
  </div>
</div>

<!-- ===== Camera + checks screen ===== -->
<section id="cameraScreen" class="screen hidden">
  <div class="mode-bar">
    <div>
      <div class="name" id="modeName">—</div>
      <div class="sub" id="modeSub">—</div>
    </div>
    <button class="change-btn" id="changeMode">モード変更</button>
  </div>

  <div class="container">
    <div class="placeholder" id="placeholder">
      「カメラを起動」を押してください
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="check-list" id="checkList"></div>

  <button class="primary" id="startBtn">カメラを起動</button>

  <div class="legend">
    <div><span class="swatch" style="background:#fbbf24;"></span>黄色：膝の高さ</div>
    <div><span class="swatch" style="background:#06b6d4;"></span>水色：スカートの裾（推定）</div>
    <div><span class="swatch" style="background:#ec4899;"></span>桃色：ソックスの上端（推定）</div>
  </div>
</section>

<script type="module">
  import {
    PoseLandmarker,
    FilesetResolver,
    DrawingUtils
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  // ===== State =====
  let rules = null;
  let selectedMode = null;
  let selectedShirtType = null;
  let poseLandmarker = null;
  let running = false;
  let lastVideoTime = -1;
  let smoothedHemY = null;
  let smoothedSockY = null;

  // ===== Elements =====
  const modeScreen = document.getElementById('modeScreen');
  const cameraScreen = document.getElementById('cameraScreen');
  const modeGrid = document.getElementById('modeGrid');
  const subOverlay = document.getElementById('subOverlay');
  const subCancel = document.getElementById('subCancel');
  const modeName = document.getElementById('modeName');
  const modeSub = document.getElementById('modeSub');
  const changeMode = document.getElementById('changeMode');
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const placeholder = document.getElementById('placeholder');
  const checkList = document.getElementById('checkList');
  const startBtn = document.getElementById('startBtn');

  const sampleCanvas = document.createElement('canvas');
  const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

  // ===== Bootstrap =====
  async function init() {
    try {
      const res = await fetch('rules.json');
      rules = await res.json();
    } catch (e) {
      modeGrid.innerHTML = '<div style="grid-column: 1/-1; color: #f87171; padding: 20px; text-align: center;">' +
        'rules.json の読み込みに失敗しました。<br>' +
        'localhost 経由で開いているか確認してください。' +
        '</div>';
      return;
    }
    buildModeGrid();
  }

  function buildModeGrid() {
    modeGrid.innerHTML = '';
    for (const mode of rules.modes) {
      const btn = document.createElement('button');
      btn.className = 'mode-btn';
      btn.innerHTML = `
        <div class="icon">${mode.icon}</div>
        <div class="title">${mode.label}</div>
        <div class="sub">${mode.season_label}</div>
      `;
      btn.addEventListener('click', () => handleModeClick(mode));
      modeGrid.appendChild(btn);
    }
  }

  function handleModeClick(mode) {
    selectedMode = mode;
    if (mode.needs_shirt_type) {
      subOverlay.classList.remove('hidden');
    } else {
      goToCameraScreen();
    }
  }

  subOverlay.addEventListener('click', (e) => {
    const t = e.target;
    if (t.classList.contains('sub-btn')) {
      selectedShirtType = t.dataset.shirt;
      subOverlay.classList.add('hidden');
      goToCameraScreen();
    }
  });
  subCancel.addEventListener('click', () => {
    selectedMode = null;
    selectedShirtType = null;
    subOverlay.classList.add('hidden');
  });

  changeMode.addEventListener('click', () => {
    stopCamera();
    cameraScreen.classList.add('hidden');
    modeScreen.classList.remove('hidden');
    selectedMode = null;
    selectedShirtType = null;
    placeholder.style.display = '';
    startBtn.disabled = false;
    startBtn.textContent = 'カメラを起動';
  });

  function goToCameraScreen() {
    modeScreen.classList.add('hidden');
    cameraScreen.classList.remove('hidden');
    modeName.textContent = selectedMode.label;
    let sub = selectedMode.season_label;
    if (selectedShirtType) {
      sub += ' ／ ' + (selectedShirtType === 'shirt' ? 'Yシャツ' : 'ポロシャツ');
    }
    modeSub.textContent = sub;
    renderCheckList();
  }

  function renderCheckList() {
    checkList.innerHTML = '';
    const c = selectedMode.checks;

    addCheck('skirt', 'スカート丈', c.skirt_length === true ? '計測待ち' : '対象外', c.skirt_length === true ? null : 'disabled', '');
    addCheck('sock', 'ソックス丈', c.sock_length ? '計測待ち' : '対象外', c.sock_length ? null : 'disabled', c.sock_length?.notes || '');
  }

  function addCheck(id, title, value, level, detail) {
    const div = document.createElement('div');
    div.className = 'check' + (level ? ' ' + level : '');
    div.id = 'check-' + id;
    div.innerHTML = `
      <div class="head"><span>${title}</span></div>
      <div class="value">${value}</div>
      <div class="detail">${detail}</div>
    `;
    checkList.appendChild(div);
  }

  function updateCheck(id, level, value, detail) {
    const el = document.getElementById('check-' + id);
    if (!el) return;
    el.className = 'check' + (level ? ' ' + level : '');
    el.querySelector('.value').textContent = value;
    el.querySelector('.detail').textContent = detail;
  }

  // ===== MediaPipe init =====
  async function initPose() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
  }

  async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width:  { ideal: 720 },
        height: { ideal: 1280 }
      },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(resolve => {
      if (video.readyState >= 2) return resolve();
      video.onloadedmetadata = resolve;
    });
    await video.play();
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    sampleCanvas.width = video.videoWidth;
    sampleCanvas.height = video.videoHeight;
    placeholder.style.display = 'none';
  }

  function stopCamera() {
    running = false;
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    smoothedHemY = null;
    smoothedSockY = null;
  }

  // ===== Sampling helpers =====
  function sampleColumn(sctx, cx, y0, y1, halfStrip, w, h) {
    const x0 = Math.max(0, cx - halfStrip);
    const x1 = Math.min(w, cx + halfStrip + 1);
    const yA = Math.max(0, y0);
    const yB = Math.min(h, y1);
    if (x1 <= x0 || yB <= yA) return null;
    const data = sctx.getImageData(x0, yA, x1 - x0, yB - yA).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i]; g += data[i+1]; b += data[i+2]; n++;
    }
    return n > 0 ? { r: r/n, g: g/n, b: b/n } : null;
  }

  function colorDelta(a, b) {
    const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
    return Math.sqrt(dr*dr + dg*dg + db*db);
  }

  // ===== Skirt hem detection (same approach as Phase 1) =====
  function detectSkirtHem(landmarks) {
    const lh = landmarks[23], rh = landmarks[24];
    const lk = landmarks[25], rk = landmarks[26];
    if (!lh || !rh || !lk || !rk) return -1;

    const cx = (lh.x + rh.x) / 2;
    const hipY = (lh.y + rh.y) / 2;
    const kneeY = (lk.y + rk.y) / 2;
    const ankleY = ((landmarks[27]?.y ?? kneeY) + (landmarks[28]?.y ?? kneeY)) / 2;
    if (kneeY <= hipY) return -1;

    sampleCtx.drawImage(video, 0, 0, sampleCanvas.width, sampleCanvas.height);
    const w = sampleCanvas.width, h = sampleCanvas.height;
    const startY = Math.floor((hipY + (kneeY - hipY) * 0.25) * h);
    const endY   = Math.floor((kneeY + (ankleY - kneeY) * 0.5) * h);
    const px = Math.floor(cx * w);

    const baseline = sampleColumn(sampleCtx, px, startY, startY + 8, 5, w, h);
    if (!baseline) return -1;

    const THRESHOLD = 45;
    const REQUIRED = 4;
    let consec = 0;
    for (let y = startY + 8; y < endY && y < h; y++) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, 5, w, h);
      if (!row) continue;
      if (colorDelta(row, baseline) > THRESHOLD) {
        if (++consec >= REQUIRED) return (y - REQUIRED) / h;
      } else { consec = 0; }
    }
    return -1;
  }

  // ===== Sock top detection =====
  // Returns { sockTopY, covered } where covered = ratio of leg covered by sock
  // covered ~ 1.0 means sock reaches the knee (ハイソックス)
  // covered ~ 0   means sock is at ankle only (くるぶし丈)
  function detectSockTop() {
    // Pick the more visible leg
    return null; // placeholder; populated below
  }

  function detectSockTopFromLandmarks(landmarks) {
    const lk = landmarks[25], rk = landmarks[26];
    const la = landmarks[27], ra = landmarks[28];
    const lConf = ((lk?.visibility ?? 0) + (la?.visibility ?? 0)) / 2;
    const rConf = ((rk?.visibility ?? 0) + (ra?.visibility ?? 0)) / 2;

    let knee, ankle;
    if (lConf >= rConf && lConf > 0.5) { knee = lk; ankle = la; }
    else if (rConf > 0.5)               { knee = rk; ankle = ra; }
    else return null;
    if (ankle.y <= knee.y) return null;

    const w = sampleCanvas.width, h = sampleCanvas.height;
    const px = Math.floor(((knee.x + ankle.x) / 2) * w);
    // scan from just above ankle upward to just below knee
    const yLow  = Math.floor((ankle.y - 0.02) * h);
    const yHigh = Math.floor((knee.y + 0.02) * h);
    if (yLow <= yHigh) return null;

    // Baseline near the bottom (likely sock or shoe top region)
    const baseline = sampleColumn(sampleCtx, px, yLow - 10, yLow, 5, w, h);
    if (!baseline) return null;

    const THRESHOLD = 35;
    const REQUIRED = 3;
    let consec = 0;
    for (let y = yLow - 1; y >= yHigh; y--) {
      const row = sampleColumn(sampleCtx, px, y, y + 1, 5, w, h);
      if (!row) continue;
      if (colorDelta(row, baseline) > THRESHOLD) {
        if (++consec >= REQUIRED) {
          const sockTopY = (y + REQUIRED) / h;
          const covered = 1 - (sockTopY - knee.y) / (ankle.y - knee.y);
          return {
            sockTopY,
            covered: Math.max(0, Math.min(1, covered))
          };
        }
      } else { consec = 0; }
    }
    // No transition found → sock spans the whole visible leg → covered ~ 1.0
    return { sockTopY: knee.y, covered: 1.0 };
  }

  // ===== Sock classification =====
  function classifySock(covered) {
    if (covered > 0.75) return 'high';
    if (covered > 0.35) return 'short';
    return 'ankle';
  }

  function evaluateSock(covered, rule) {
    const cls = classifySock(covered);
    const expected = rule.expected;
    const allowed = Array.isArray(expected) ? expected : [expected];
    const ankleForbidden = rule.ankle_forbidden === true;

    let label;
    if (cls === 'high')   label = 'ハイソックス';
    else if (cls === 'short') label = '短めソックス';
    else                  label = 'くるぶし丈';

    if (cls === 'ankle' && ankleForbidden) {
      return { level: 'ng', label, detail: 'くるぶし丈は規定外です' };
    }
    if (allowed.includes(cls)) {
      return { level: 'ok', label, detail: 'ソックス丈OK' };
    }
    if (cls === 'ankle') {
      return { level: 'ng', label, detail: 'このモードではくるぶし丈は不可' };
    }
    if (allowed.includes('high') && cls === 'short') {
      return { level: 'ng', label, detail: 'このモードはハイソックスが必須' };
    }
    if (allowed.includes('short') && cls === 'high') {
      return { level: 'warn', label, detail: '想定よりも長いソックスです' };
    }
    return { level: 'warn', label, detail: '想定と異なる丈です' };
  }

  // ===== Drawing & loop =====
  function draw(result) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!result.landmarks || result.landmarks.length === 0) {
      if (selectedMode.checks.skirt_length === true) updateCheck('skirt', 'warn', '人物未検出', '全身が映るように立ってください');
      if (selectedMode.checks.sock_length)            updateCheck('sock',  'warn', '人物未検出', '');
      smoothedHemY = null;
      smoothedSockY = null;
      return;
    }

    const lm = result.landmarks[0];
    const drawingUtils = new DrawingUtils(ctx);
    drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {
      color: 'rgba(255,255,255,0.35)', lineWidth: 2
    });
    drawingUtils.drawLandmarks(lm, { radius: 3, color: '#ffffff' });

    sampleCtx.drawImage(video, 0, 0, sampleCanvas.width, sampleCanvas.height);

    const lk = lm[25], rk = lm[26];
    if (!lk || !rk || (lk.visibility ?? 1) < 0.5 || (rk.visibility ?? 1) < 0.5) {
      if (selectedMode.checks.skirt_length === true) updateCheck('skirt', 'warn', '膝が見えません', '下半身全体がはっきり映るように');
      if (selectedMode.checks.sock_length)            updateCheck('sock',  'warn', '膝が見えません', '');
      smoothedHemY = null;
      smoothedSockY = null;
      return;
    }

    const kneeY  = (lk.y + rk.y) / 2;
    const ankleY = ((lm[27]?.y ?? kneeY) + (lm[28]?.y ?? kneeY)) / 2;

    // ----- Skirt check -----
    if (selectedMode.checks.skirt_length === true) {
      // Yellow knee line
      ctx.strokeStyle = '#fbbf24';
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(0, kneeY * canvas.height);
      ctx.lineTo(canvas.width, kneeY * canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);

      const rawHemY = detectSkirtHem(lm);
      if (rawHemY < 0) {
        updateCheck('skirt', 'warn', '裾未検出', '黄色線が膝の高さ。目視で確認してください');
        smoothedHemY = null;
      } else {
        smoothedHemY = smoothedHemY === null ? rawHemY : smoothedHemY * 0.7 + rawHemY * 0.3;
        const hemY = smoothedHemY;

        ctx.strokeStyle = '#06b6d4';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, hemY * canvas.height);
        ctx.lineTo(canvas.width, hemY * canvas.height);
        ctx.stroke();

        const kneeAnkle = ankleY - kneeY;
        if (kneeAnkle > 0.01) {
          const cm = ((hemY - kneeY) / kneeAnkle) * 40;
          if (cm < -3) updateCheck('skirt', 'ng',   `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`, 'スカートが短すぎます');
          else if (cm < -0.5) updateCheck('skirt', 'warn', `膝より約 ${Math.abs(cm).toFixed(1)} cm 上`, '基準ぎりぎりです');
          else if (cm < 1.5)  updateCheck('skirt', 'warn', `膝の高さ付近`, 'ちょうど膝の位置');
          else                updateCheck('skirt', 'ok',   `膝より約 ${cm.toFixed(1)} cm 下`, 'スカート丈OK');
        }
      }
    }

    // ----- Sock check -----
    if (selectedMode.checks.sock_length) {
      const sock = detectSockTopFromLandmarks(lm);
      if (!sock) {
        updateCheck('sock', 'warn', '計測不可', '足元がはっきり映るようにしてください');
        smoothedSockY = null;
      } else {
        smoothedSockY = smoothedSockY === null ? sock.sockTopY : smoothedSockY * 0.7 + sock.sockTopY * 0.3;
        const sockTopY = smoothedSockY;

        ctx.strokeStyle = '#ec4899';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, sockTopY * canvas.height);
        ctx.lineTo(canvas.width, sockTopY * canvas.height);
        ctx.stroke();

        const covered = 1 - (sockTopY - kneeY) / (ankleY - kneeY);
        const result = evaluateSock(Math.max(0, Math.min(1, covered)), selectedMode.checks.sock_length);
        const pctText = `膝〜足首間で${Math.round(covered * 100)}%カバー`;
        updateCheck('sock', result.level, result.label, `${result.detail}（${pctText}）`);
      }
    }
  }

  async function loop() {
    if (!running) return;
    if (poseLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      try {
        const result = poseLandmarker.detectForVideo(video, performance.now());
        draw(result);
      } catch (e) { console.error(e); }
    }
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.textContent = '起動中...';
    try {
      if (!poseLandmarker) await initPose();
      await initCamera();
      running = true;
      startBtn.textContent = '計測中';
      loop();
    } catch (err) {
      console.error(err);
      startBtn.disabled = false;
      startBtn.textContent = 'もう一度試す';
      alert('起動エラー: ' + (err.message || err));
    }
  });

  init();
</script>

</body>
</html>
